<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>马原单选刷题</title>
  <style>
    :root {
      --ink: #22231f;
      --muted: #676e65;
      --paper: #fbfcf7;
      --panel: #ffffff;
      --panel-2: #f4f7f0;
      --line: #d8dfd1;
      --jade: #1f7a5a;
      --jade-soft: #dceee7;
      --cinnabar: #be4935;
      --cinnabar-soft: #f7ded8;
      --blue: #315f8a;
      --gold: #b98222;
      --shadow: 0 18px 48px rgba(35, 39, 31, .12);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "LXGW WenKai", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background:
        linear-gradient(135deg, rgba(31, 122, 90, .10), transparent 28%),
        linear-gradient(45deg, transparent 0 48%, rgba(190, 73, 53, .09) 48% 52%, transparent 52%),
        repeating-linear-gradient(0deg, rgba(34,35,31,.035) 0 1px, transparent 1px 31px),
        #eef3ec;
      letter-spacing: 0;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(31,122,90,.08) 0 1px, transparent 1px 78px),
        linear-gradient(0deg, rgba(190,73,53,.06) 0 1px, transparent 1px 78px);
      mask-image: linear-gradient(180deg, rgba(0,0,0,.6), transparent 72%);
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid rgba(49,95,138,.24);
      outline-offset: 2px;
    }
    .app { max-width: 1440px; margin: 0 auto; padding: 18px; }
    .topbar {
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 16px;
      padding: 18px 20px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }
    .topbar::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cinnabar), var(--gold), var(--jade), var(--blue));
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .seal {
      width: 54px; height: 54px; flex: 0 0 54px;
      display: grid; place-items: center;
      color: white; background: var(--cinnabar);
      border: 3px double rgba(255,255,255,.72);
      border-radius: 50%; font-weight: 800; font-size: 22px;
      box-shadow: 0 8px 18px rgba(190,73,53,.24);
    }
    .eyebrow { margin: 0 0 4px; color: var(--jade); font-size: 13px; font-weight: 800; }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 48px); line-height: 1.03; letter-spacing: 0; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 15px; }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .icon-btn, .option, .stage-tab, .mode-tab, .nav-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: var(--radius);
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .icon-btn { min-height: 40px; padding: 0 12px; display: inline-flex; align-items: center; gap: 7px; }
    .icon-btn:hover, .nav-btn:hover, .option:hover { transform: translateY(-1px); border-color: var(--jade); box-shadow: 0 8px 20px rgba(31,122,90,.11); }
    .shell { display: grid; grid-template-columns: 292px minmax(0, 1fr); gap: 18px; margin-top: 18px; align-items: start; }
    .side { display: grid; gap: 14px; position: sticky; top: 14px; }
    .panel, .question-panel, .stat {
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(35,39,31,.08);
    }
    .panel { padding: 14px; backdrop-filter: blur(8px); }
    .control-title { margin: 0 0 9px; font-size: 13px; color: var(--muted); font-weight: 800; }
    .segmented { display: grid; gap: 8px; }
    .stage-tab, .mode-tab {
      width: 100%; min-height: 48px; padding: 9px 10px;
      display: flex; align-items: center; justify-content: flex-start; gap: 10px;
      text-align: left;
    }
    .stage-tab .meta { display: grid; gap: 1px; }
    .stage-tab strong, .mode-tab strong { font-size: 15px; }
    .stage-tab small { color: var(--muted); font-size: 12px; }
    .stage-tab.active, .mode-tab.active { background: var(--jade-soft); border-color: var(--jade); color: #123f31; }
    .field { display: grid; gap: 8px; margin-top: 14px; }
    .field label { color: var(--muted); font-size: 13px; font-weight: 800; }
    select, input[type="search"] {
      width: 100%; min-height: 42px; border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--panel); color: var(--ink); padding: 0 11px; outline: none;
    }
    select:focus, input[type="search"]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(49,95,138,.12); }
    .study { display: grid; gap: 14px; min-width: 0; }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 10px; }
    .stat {
      position: relative;
      overflow: hidden;
      min-height: 84px;
      padding: 13px;
      display: grid;
      align-content: space-between;
    }
    .stat::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--jade), transparent);
    }
    .stat span { color: var(--muted); font-size: 12px; font-weight: 800; }
    .stat strong { font-size: 24px; line-height: 1; }
    .question-panel {
      overflow: hidden;
      border-top: 4px solid var(--jade);
      animation: liftIn .22s ease-out both;
    }
    .question-head {
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 15px 18px; border-bottom: 1px solid var(--line); background: linear-gradient(90deg, #ffffff, #f6faf5);
    }
    .q-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; font-weight: 800; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px; min-height: 28px; padding: 0 9px;
      border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
      white-space: nowrap;
    }
    .question-body { padding: 20px 18px 18px; display: grid; gap: 16px; }
    .stem { font-size: clamp(18px, 2.2vw, 25px); line-height: 1.65; margin: 0; font-weight: 800; }
    .options { display: grid; gap: 10px; }
    .option {
      width: 100%; min-height: 58px; padding: 12px 14px; display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 28px; gap: 10px; align-items: center;
      text-align: left; background: var(--panel);
    }
    .option:not(:disabled):active { transform: translateY(0); box-shadow: none; }
    .option:disabled { cursor: default; opacity: 1; }
    .option .letter {
      width: 34px; height: 34px; display: grid; place-items: center;
      border: 1px solid var(--line); border-radius: 50%; font-weight: 900; color: var(--blue); background: #f8fbff;
    }
    .option .text { line-height: 1.45; overflow-wrap: anywhere; }
    .option .mark { text-align: center; font-weight: 900; }
    .option.correct { border-color: var(--jade); background: #edf8f2; }
    .option.correct .letter { background: var(--jade); color: white; border-color: var(--jade); }
    .option.wrong { border-color: var(--cinnabar); background: var(--cinnabar-soft); }
    .option.wrong .letter { background: var(--cinnabar); color: white; border-color: var(--cinnabar); }
    .feedback {
      position: relative;
      display: none; border: 1px solid var(--line); border-radius: var(--radius); padding: 14px;
      background: #fffdf8;
    }
    .feedback::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 12px;
      bottom: 12px;
      width: 4px;
      border-radius: 999px;
      background: var(--gold);
    }
    .feedback.show { display: grid; gap: 10px; }
    .feedback.good { border-color: rgba(31,122,90,.45); background: #eef8f2; }
    .feedback.bad { border-color: rgba(190,73,53,.45); background: #fff0ed; }
    .feedback h2 { margin: 0; font-size: 18px; }
    .feedback p { margin: 0; line-height: 1.7; }
    .keywords { display: flex; flex-wrap: wrap; gap: 8px; }
    .keyword { border: 1px solid var(--line); background: #f7f9f4; border-radius: 999px; padding: 5px 9px; font-size: 13px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
    .nav-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .nav-btn { min-height: 42px; padding: 0 13px; display: inline-flex; align-items: center; gap: 7px; background: var(--panel); }
    .nav-btn.primary { background: var(--ink); color: white; border-color: var(--ink); }
    .nav-btn.primary:hover { background: var(--jade); border-color: var(--jade); }
    .nav-btn.warn { color: var(--cinnabar); }
    .chapter-list { display: grid; gap: 10px; }
    .chapter-row { display: grid; gap: 5px; }
    .chapter-line { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; }
    .bar { height: 8px; background: #e8ede3; border-radius: 999px; overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--jade), var(--gold)); }
    .empty { padding: 30px; text-align: center; color: var(--muted); }
    .kbd { font-weight: 900; color: var(--blue); }
    @keyframes liftIn {
      from { opacity: .72; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .study { order: 1; }
      .side { order: 2; }
      .side { position: static; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .app { padding: 10px; }
      .topbar, .question-head { flex-direction: column; align-items: stretch; }
      .top-actions { justify-content: stretch; }
      .top-actions .icon-btn { flex: 1; justify-content: center; }
      .side { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stat { min-height: 68px; padding: 11px; }
      .stat strong { font-size: 22px; }
      .stat:last-child { grid-column: 1 / -1; }
      .option { grid-template-columns: 32px minmax(0, 1fr) 22px; }
      .stem { font-size: 18px; }
    }
  </style>
</head>

第一章", "生死由命，富贵在天"], "explanation": "本题考查客观唯心主义。生死富贵由“天”决定，把世界本原归结为外在神秘精神，属于客观唯心主义。"}, {"id": "q031", "chapter": "第一章", "number": 7, "sourceLine": 286, "stem": "（ ）原理是辨证唯物主义最基本、最核心的观点，是马克思主义的基石。", "options": {"A": "矛盾的普遍性", "B": "事物联系的客观性", "C": "物质的统一性", "D": "事物发展的永恒性"}, "answer": "C", "answerText": "物质的统一性", "keywords": ["马克思主义", "物质", "物质的统一性"], "explanation": "本题考查辩证唯物主义的核心基础。物质统一性原理是辩证唯物主义最基本、最核心的观点，是马克思主义的基石。"}, {"id": "q032", "chapter": "第一章", "number": 8, "sourceLine": 291, "stem": "“只要你对着飞驰的流星许个愿，你的愿望就能实现。”这种说法（ ）。", "options": {"A": "肯定了联系的普遍性和多样性", "B": "揭示了意识能够正确反映客观事物", "C": "否定了意识的能动作用", "D": "忽视了联系的客观性"}, "answer": "D", "answerText": "忽视了联系的客观性", "keywords": ["联系", "忽视了联系的客观性"], "explanation": "本题考查联系的客观性。对流星许愿就能实现愿望，是把主观愿望强加给客观事物，忽视联系的客观性。"}, {"id": "q033", "chapter": "第一章", "number": 9, "sourceLine": 296, "stem": "“观念的东西不外是移入人的头脑并在人的头脑中改造过的物质的东西而已。”这个命题表明（ ）。", "options": {"A": "意识是客观存在的主观映象", "B": "人脑是意识的源泉", "C": "观念的东西与物质的东西没有区别", "D": "意识是人脑特有的物质现象"}, "answer": "A", "answerText": "意识是客观存在的主观映象", "keywords": ["物质", "意识", "意识是客观存在的主观映象"], "explanation": "本题考查意识的本质。观念是进入头脑并被改造过的物质东西，说明意识是客观存在的主观映象。"}, {"id": "q034", "chapter": "第一章", "number": 10, "sourceLine": 299, "stem": "“巧妇难为无米之炊”，说明了（ ）", "options": {"A": "人的能动作用是受客观条件制约的", "B": "人不能创造和消灭规律", "C": "必须发挥人的主观能动性", "D": "物质是不以人的意志为转移的客观存在"}, "answer": "A", "answerText": "人的能动作用是受客观条件制约的", "keywords": ["第一章", "人的能动作用是受客观条件制约的"], "explanation": "本题考查主观能动性和客观条件。“无米之炊”说明人的能动作用必须受客观条件制约。"}, {"id": "q035", "chapter": "第一章", "number": 11, "sourceLine": 304, "stem": "《坛经》记载“时有风吹幡动，一僧曰风动，一僧曰幡动，议论不已。惠能进曰：不是风动，不是幡动，仁者心动”。惠能的观点说的是（ ）。", "options": {"A": "运动是物质的根本属性", "B": "运动与物质不可分", "C": "精神是运动的主体", "D": "精神运动是物质运动的一种形式"}, "answer": "C", "answerText": "精神是运动的主体", "keywords": ["第一章", "精神是运动的主体"], "explanation": "本题考查主观唯心主义。惠能把风动、幡动归结为心动，实际上把精神看作运动主体。"}, {"id": "q036", "chapter": "第一章", "number": 12, "sourceLine": 307, "stem": "“画饼不能充饥”说明（ ）。", "options": {"A": "精神的东西是不重要的", "B": "精神不是物质的反映", "C": "精神是物质的主观映象", "D": "精神不能代替物质"}, "answer": "D", "answerText": "精神不能代替物质", "keywords": ["物质", "精神不能代替物质"], "explanation": "本题考查精神和物质的关系。“画饼”是观念，不能真正充饥，说明精神不能代替物质。"}, {"id": "q037", "chapter": "第一章", "number": 13, "sourceLine": 310, "stem": "古希腊哲学家赫拉克利特提出“人不能两次踏入同一条河流”，他的弟子克拉底鲁提出“人一次也不能踏入同一条河流”。这两种观点（ ）。", "options": {"A": "都是辩证法的观点", "B": "都是形而上学的观点", "C": "前者是辩证法，后者是诡辩论", "D": "前者是诡辩论，后者是辩证法"}, "answer": "C", "answerText": "前者是辩证法，后者是诡辩论", "keywords": ["第一章", "前者是辩证法，后者是诡辩论"], "explanation": "本题考查运动和静止。赫拉克利特承认变化中有相对稳定，是辩证法；克拉底鲁只讲绝对变化，走向诡辩论。"}, {"id": "q038", "chapter": "第一章", "number": 14, "sourceLine": 313, "stem": "在世界统一性的问题上唯物论与唯心论的根本分歧是（ ）。", "options": {"A": "统一于实践还是认识", "B": "统一于运动还是静止", "C": "统一于存在还是非存在", "D": "统一于物质还是精神"}, "answer": "D", "answerText": "统一于物质还是精神", "keywords": ["物质", "统一于物质还是精神"], "explanation": "本题考查唯物论与唯心论的根本分歧。世界统一于物质还是精神，是二者在世界统一性问题上的根本区别。"}, {"id": "q039", "chapter": "第一章", "number": 15, "sourceLine": 316, "stem": "“人的意识不仅反映客观世界，而且通过指导实践改变和创造客观世界”的观点属于（ ）。", "options": {"A": "夸大了意识的作用", "B": "正确表达了意识的能动性", "C": "唯意志论的观点", "D": "主观唯心主义的观点"}, "answer": "B", "answerText": "正确表达了意识的能动性", "keywords": ["意识", "实践", "正确表达了意识的能动性"], "explanation": "本题考查意识的能动作用。意识不仅反映世界，还能指导实践改变世界，这是对意识能动性的正确表述。"}, {"id": "q040", "chapter": "第一章", "number": 16, "sourceLine": 319, "stem": "唯物辩证法和形而上学对立的焦点在于是否承认（ ）。", "options": {"A": "事物的普遍联系", "B": "变化和发展", "C": "事物发展的根本动力是事物的内部矛盾", "D": "经过量变过渡到质变事物的发展是前进性和曲折性的统一"}, "answer": "C", "answerText": "事物发展的根本动力是事物的内部矛盾", "keywords": ["矛盾", "事物发展的根本动力是事物的内部矛盾"], "explanation": "本题考查辩证法与形而上学的焦点。是否承认内部矛盾是事物发展的根本动力，是两者对立的焦点。"}, {"id": "q041", "chapter": "第一章", "number": 17, "sourceLine": 322, "stem": "“一切以时间、地点、条件为转移”的观点是（ ）。", "options": {"A": "取消人的主观能动性的错误观点", "B": "夸大客观条件作用的机械论观点", "C": "马克思主义关于事物是运动变化的观点", "D": "必然导致形而上学外因论的错误观点"}, "answer": "C", "answerText": "马克思主义关于事物是运动变化的观点", "keywords": ["马克思主义", "马克思主义关于事物是运动变化的观点"], "explanation": "本题考查具体条件具体分析。时间、地点、条件都在变化，因此要用运动变化的观点看问题。"}, {"id": "q042", "chapter": "第一章", "number": 18, "sourceLine": 327, "stem": "时间和空间是（ ）。", "options": {"A": "物质的惟一属性", "B": "运动着的物质的存在形式", "C": "表征物质存在的工具", "D": "事物联系的多样性"}, "answer": "B", "answerText": "运动着的物质的存在形式", "keywords": ["物质", "运动着的物质的存在形式"], "explanation": "本题考查时间和空间。时间、空间不是独立实体，而是运动着的物质的存在形式。"}, {"id": "q043", "chapter": "第一章", "number": 19, "sourceLine": 332, "stem": "辩证唯物主义认为事物发展的规律是（ ）。", "options": {"A": "思维对事物本质的概括和反映", "B": "用来整理感性材料的思维形式", "C": "事物内在的、固有的、本质的联系", "D": "事物联系和发展的基本环节"}, "answer": "C", "answerText": "事物内在的、固有的、本质的联系", "keywords": ["联系", "事物内在的、固有的、本质的联系"], "explanation": "本题考查规律的含义。规律是事物内在的、固有的、本质的联系，不是人的主观整理形式。"}, {"id": "q044", "chapter": "第一章", "number": 20, "sourceLine": 337, "stem": "“守株待兔”故事中农夫的错误从哲学上讲是（ ）。", "options": {"A": "否认了规律的客观性", "B": "片面夸大了人的主观能动性", "C": "没有在事物运动变化中把握规律", "D": "把事物运动中的偶然联系当作了必然联系"}, "answer": "D", "answerText": "把事物运动中的偶然联系当作了必然联系", "keywords": ["联系"], "explanation": "本题考查偶然性和必然性。农夫把一次偶然撞树当成必然规律，所以错在把偶然联系当必然联系。"}, {"id": "q045", "chapter": "第一章", "number": 22, "sourceLine": 342, "stem": "矛盾的特殊性是指（ ）。", "options": {"A": "每一事物的矛盾不包含共性", "B": "构成事物一切要素的总和", "C": "矛盾斗争的对抗形式", "D": "每一事物内部所包含的矛盾及每一个矛盾各个方面都有其特点"}, "answer": "D", "answerText": "每一事物内部所包含的矛盾及每一个矛盾各个方面都有其特点", "keywords": ["矛盾"], "explanation": "本题考查矛盾特殊性。特殊性就是不同事物、不同矛盾及矛盾各方面都有自己的特点。"}, {"id": "q046", "chapter": "第一章", "number": 23, "sourceLine": 347, "stem": "马克思主义普遍真理同中国革命、建设、改革、新时代具体实际相结合形成了中国化马克思主义理论成果，这体现了（ ）。", "options": {"A": "主要矛盾和非主要矛盾辩证关系的原理", "B": "矛盾同一性和斗争性相结合的原理", "C": "矛盾普遍性和特殊性辩证关系的原理", "D": "内部矛盾和外部矛盾相互作用的原理"}, "answer": "C", "answerText": "矛盾普遍性和特殊性辩证关系的原理", "keywords": ["马克思主义", "矛盾", "真理", "矛盾普遍性和特殊性辩证关系的原理"], "explanation": "本题考查矛盾普遍性和特殊性的关系。马克思主义普遍真理同中国具体实际结合，正是普遍性与特殊性的统一。"}, {"id": "q047", "chapter": "第一章", "number": 24, "sourceLine": 352, "stem": "区别量变与质变的根本标志是（ ）。", "options": {"A": "事物变化持续时间的久暂", "B": "事物变化的显著不显著", "C": "事物量的变化是否超出度的范围", "D": "事物的质变是否引起新的量变"}, "answer": "C", "answerText": "事物量的变化是否超出度的范围", "keywords": ["量变", "事物量的变化是否超出度的范围"], "explanation": "本题考查量变和质变的区别。是否超出“度”的范围，是区分量变与质变的根本标志。"}, {"id": "q048", "chapter": "第一章", "number": 25, "sourceLine": 357, "stem": "实际工作中的“一刀切”的工作方法是由于忽视了（ ）。", "options": {"A": "矛盾的同一性", "B": "矛盾的斗争性", "C": "矛盾的普遍性", "D": "矛盾的特殊性"}, "answer": "D", "answerText": "矛盾的特殊性", "keywords": ["矛盾", "矛盾的特殊性"], "explanation": "本题考查矛盾特殊性。“一刀切”不看具体情况，错误在于忽视矛盾的特殊性。"}, {"id": "q049", "chapter": "第一章", "number": 26, "sourceLine": 362, "stem": "唯物辩证法的总特征是（ ）。", "options": {"A": "联系的观点和发展的观点", "B": "物质第一性、意识第二性的观点", "C": "运动和静止辩证统一的观点", "D": "对立统一的观点"}, "answer": "A", "answerText": "联系的观点和发展的观点", "keywords": ["联系", "联系的观点和发展的观点"], "explanation": "本题考查唯物辩证法总特征。唯物辩证法从总体上强调普遍联系和永恒发展。"}, {"id": "q050", "chapter": "第一章", "number": 27, "sourceLine": 367, "stem": "对于同一事物，不同的人有不同的反映，这说明（ ）。", "options": {"A": "意识是主体的自由创造", "B": "意识不受客体影响", "C": "意识受主体状况的影响", "D": "意识的内容是主观的"}, "answer": "C", "answerText": "意识受主体状况的影响", "keywords": ["意识", "意识受主体状况的影响"], "explanation": "本题考查意识的主体差异。同一对象在不同人那里反映不同，说明意识受主体状况影响。"}, {"id": "q051", "chapter": "第一章", "number": 28, "sourceLine": 372, "stem": "（ ）揭示了事物普遍联系的根本内容和变化发展的内在动力。", "options": {"A": "对立统一规律", "B": "质量互变规律", "C": "否定之否定规律", "D": "事物联系和发展的基本环节"}, "answer": "A", "answerText": "对立统一规律", "keywords": ["联系", "对立统一规律"], "explanation": "本题考查对立统一规律。对立统一规律揭示联系的根本内容和发展的内在动力，是辩证法的实质和核心。"}, {"id": "q052", "chapter": "第一章", "number": 29, "sourceLine": 377, "stem": "“勿以善小而不为，勿以恶小而为之”说明（ ）。", "options": {"A": "量变是由质变引起的", "B": "质变与量变是相互渗透的", "C": "质变在事物发展中起重要作用", "D": "质变是由量变引起的"}, "answer": "D", "answerText": "质变是由量变引起的", "keywords": ["量变", "质变是由量变引起的"], "explanation": "本题考查量变引起质变。“善小”“恶小”强调小量积累会导致性质变化。"}, {"id": "q053", "chapter": "第一章", "number": 30, "sourceLine": 382, "stem": "在自然界，没有上就无所谓下；在社会中，没有先进就无所谓落后；在认识中，没有正确就无所谓错误。这说明（ ）。", "options": {"A": "矛盾双方是相互排斥的", "B": "矛盾双方是相互依存的", "C": "矛盾双方是相互渗透的", "D": "矛盾双方是相互转化的"}, "answer": "B", "answerText": "矛盾双方是相互依存的", "keywords": ["矛盾"], "explanation": "本题考查矛盾双方的同一性。上和下、先进和落后、正确和错误相互规定、相互依存。"}, {"id": "q054", "chapter": "第一章", "number": 31, "sourceLine": 387, "stem": "“金无足赤，人无完人”的观点属于（ ）。", "options": {"A": "相对主义的观点", "B": "主观唯心主义的观点", "C": "唯物辩证法的观点", "D": "形而上学的观点"}, "answer": "C", "answerText": "唯物辩证法的观点", "keywords": ["第一章", "唯物辩证法的观点"], "explanation": "本题考查全面看问题。“金无足赤，人无完人”承认事物有优点也有缺点，属于唯物辩证法观点。"}, {"id": "q055", "chapter": "第一章", "number": 32, "sourceLine": 392, "stem": "习近平指出，要学习掌握事物矛盾运动的基本原理，不断强化问题意识，积极面对和化解前进中遇到的矛盾。在工作中，我们既要注重总体谋划，又要注重牵住“牛鼻子”。从哲学上讲，“既要注重总体谋划，又要注重牵住‘牛鼻子’”这句话体现的是（ ）。", "options": {"A": "要坚持矛盾斗争性和同一性的统一", "B": "要坚持量变与质变的辩证关系", "C": "要正确把握整体与部分的不同功能", "D": "要坚持两点论和重点论的统一"}, "answer": "D", "answerText": "要坚持两点论和重点论的统一", "keywords": ["矛盾", "要坚持两点论和重点论的统一"], "explanation": "本题考查两点论和重点论。既总体谋划又牵住“牛鼻子”，就是既全面看问题，又抓主要矛盾和重点。"}, {"id": "q056", "chapter": "第二章", "number": 1, "sourceLine": 591, "stem": "实践是认识的来源表明（ ）。", "options": {"A": "只要参加实践活动就能获得正确认识", "B": "每个人的认识都直接来源于实践", "C": "一切认识归根到底都是从实践中获得的", "D": "书本上的知识不是从实践中得来的"}, "answer": "C", "answerText": "一切认识归根到底都是从实践中获得的", "keywords": ["实践", "认识", "一切认识归根到底都是从实践中获得的"], "explanation": "本题考查实践是认识的来源。不是每个人都必须直接经历一切实践，而是一切认识归根到底来源于实践。"}, {"id": "q057", "chapter": "第二章", "number": 2, "sourceLine": 596, "stem": "感性认识的形式是（ ）。", "options": {"A": "概念、判断、推理", "B": "感觉、知觉、表象", "C": "分析和综合", "D": "总结和概括"}, "answer": "B", "answerText": "感觉、知觉、表象", "keywords": ["联系", "认识", "感觉、知觉、表象"], "explanation": "本题考查感性认识形式。感性认识是对事物外部联系的直接反映，形式是感觉、知觉、表象。"}, {"id": "q058", "chapter": "第二章", "number": 3, "sourceLine": 601, "stem": "理性认识的形式是（ ）。", "options": {"A": "感觉、知觉、表象", "B": "感觉、分析、综合", "C": "概念、判断、推理", "D": "识记、联想、判断"}, "answer": "C", "answerText": "概念、判断、推理", "keywords": ["认识", "概念、判断、推理"], "explanation": "本题考查理性认识形式。理性认识通过抽象思维把握本质，形式是概念、判断、推理。"}, {"id": "q059", "chapter": "第二章", "number": 4, "sourceLine": 606, "stem": "辩证唯物主义认识论认为，认识的本质是（ ）。", "options": {"A": "主体在实践基础上对客体的能动反映", "B": "主体对客体的直观反映", "C": "主体头脑中固有的", "D": "绝对观念在头脑中的显现"}, "answer": "A", "answerText": "主体在实践基础上对客体的能动反映", "keywords": ["实践", "认识", "主体在实践基础上对客体的能动反映"], "explanation": "本题考查认识本质。辩证唯物主义认识论认为认识是在实践基础上，主体对客体的能动反映。"}, {"id": "q060", "chapter": "第二章", "number": 5, "sourceLine": 611, "stem": "在实践和认识的辩证运动中，主观必须统一于客观，认识必须统一于（ ）。", "options": {"A": "理论", "B": "实践", "C": "感性", "D": "理性"}, "answer": "B", "answerText": "实践", "keywords": ["实践", "认识"], "explanation": "本题考查实践和认识的统一。认识是否正确，最终要统一到实践中去，主观必须符合客观。"}, {"id": "q061", "chapter": "第二章", "number": 6, "sourceLine": 616, "stem": "实践的基本特征不包括（ ）。", "options": {"A": "客观实在性", "B": "结果有效性", "C": "自觉能动性", "D": "社会历史性"}, "answer": "B", "answerText": "结果有效性", "keywords": ["实践"], "explanation": "本题考查实践基本特征。实践具有客观实在性、自觉能动性、社会历史性，“结果有效性”不是基本特征。"}, {"id": "q062", "chapter": "第二章", "number": 7, "sourceLine": 621, "stem": "认识主体和认识客体之间最基本的关系是（ ）。", "options": {"A": "改造与被改造的实践关系", "B": "反映与被反映的认识关系", "C": "相互依存的关系", "D": "相互作用的关系"}, "answer": "A", "answerText": "改造与被改造的实践关系", "keywords": ["实践", "认识", "改造与被改造的实践关系"], "explanation": "本题考查主体和客体关系。认识关系建立在实践关系基础上，最基本的是改造与被改造的实践关系。"}, {"id": "q063", "chapter": "第二章", "number": 8, "sourceLine": 626, "stem": "任何真理都只能是主观对客观事物近似正确即相对正确的反映。这说明（ ）。", "options": {"A": "真理具有绝对性", "B": "真理具有客观性", "C": "真理具有相对性", "D": "真理具有全面性"}, "answer": "C", "answerText": "真理具有相对性", "keywords": ["真理", "认识", "真理具有相对性"], "explanation": "本题考查真理相对性。真理是近似正确、有限度的认识，说明真理具有相对性。"}, {"id": "q064", "chapter": "第二章", "number": 9, "sourceLine": 631, "stem": "（ ）是人类生存和发展最基本的活动，是人类社会生活的本质，是人的认识产生和发展的基础，也是真理与价值统一的基础。", "options": {"A": "实践", "B": "物质", "C": "规律", "D": "真理"}, "answer": "A", "answerText": "实践", "keywords": ["实践", "真理", "认识"], "explanation": "本题考查实践的基础地位。实践是人类最基本活动，是认识产生发展的基础，也是真理与价值统一的基础。"}, {"id": "q065", "chapter": "第二章", "number": 10, "sourceLine": 633, "stem": "宋代诗人陆游在一首诗中说：“纸上得来终觉浅，绝知此事要躬行”。这是强调（ ）。", "options": {"A": "读书不能获得真知", "B": "书本知识不能指导实践", "C": "一切知识都直接来源于实践", "D": "在实践中检验和发展真理"}, "answer": "D", "answerText": "在实践中检验和发展真理", "keywords": ["实践", "真理", "认识", "在实践中检验和发展真理"], "explanation": "本题考查实践检验和发展真理。“绝知此事要躬行”强调不能停留在书本上，要到实践中检验和发展认识。"}, {"id": "q066", "chapter": "第二章", "number": 11, "sourceLine": 638, "stem": "自由是有条件的。一是认识条件，二是（ ）条件。", "options": {"A": "价值", "B": "真理", "C": "自由", "D": "实践"}, "answer": "D", "answerText": "实践", "keywords": ["实践", "认识"], "explanation": "本题考查自由的条件。自由不是随心所欲，既要有认识条件，也要有实践条件。"}, {"id": "q067", "chapter": "第二章", "number": 12, "sourceLine": 643, "stem": "检验认识的真理性，就是检验（ ）。", "options": {"A": "已有的理论相符合", "B": "已被实践证明的真理相符合", "C": "人的主观认识同客观实际是否相符合以及符合的程度", "D": "党的路线、方针、政策相符合"}, "answer": "C", "answerText": "人的主观认识同客观实际是否相符合以及符合的程度", "keywords": ["真理", "认识"], "explanation": "本题考查真理性检验的内容。检验真理就是看主观认识是否符合客观实际以及符合程度。"}, {"id": "q068", "chapter": "第二章", "number": 13, "sourceLine": 648, "stem": "恩格斯明确指出，“社会一旦有技术上的需要，则这种需要就会比十所大学更能把科学推向前进。”这说明（ ）。", "options": {"A": "实践是认识的来源", "B": "技术推动了科学的发展", "C": "实践是认识发展的动力", "D": "科学进步是实践的目的"}, "answer": "C", "answerText": "实践是认识发展的动力", "keywords": ["实践", "认识", "实践是认识发展的动力"], "explanation": "本题考查实践是认识发展的动力。技术需要推动科学前进，说明实践需要不断提出新课题，推动认识发展。"}, {"id": "q069", "chapter": "第二章", "number": 14, "sourceLine": 653, "stem": "在真理观上坚持辩证法，就必须承认（ ）。", "options": {"A": "真理是主体对客体的正确反映", "B": "真理既是绝对的又是相对的", "C": "真理既是正确的又包含某些错误", "D": "真理既是全面的又是具体的"}, "answer": "B", "answerText": "真理既是绝对的又是相对的", "keywords": ["真理", "真理既是绝对的又是相对的"], "explanation": "本题考查真理的辩证法。坚持辩证法就要承认真理既有绝对性又有相对性。"}, {"id": "q070", "chapter": "第二章", "number": 15, "sourceLine": 658, "stem": "“认识的本质是主体在实践基础上对客体的能动反映”。这是一种（ ）。", "options": {"A": "辩证唯物主义认识论观点", "B": "机械唯物主义认识论观点", "C": "主观唯心主义认识论观点", "D": "客观唯心主义认识论观点"}, "answer": "A", "answerText": "辩证唯物主义认识论观点", "keywords": ["实践", "认识", "辩证唯物主义认识论观点"], "explanation": "本题考查认识论立场。主体在实践基础上对客体的能动反映，是辩证唯物主义认识论的基本观点。"}, {"id": "q071", "chapter": "第二章", "number": 16, "sourceLine": 663, "stem": "“判定认识或理论之是否真理，不是依主观上觉得如何而定，而是依客观上社会实践的结果如何而定。真理的标准只能是社会的实践。”这说明（ ）。", "options": {"A": "实践是认识的来源", "B": "实践是认识发展的动力", "C": "实践是认识的目的", "D": "实践是检验认识真理性的唯一标准"}, "answer": "D", "answerText": "实践是检验认识真理性的唯一标准", "keywords": ["实践", "真理", "认识", "实践是检验认识真理性的唯一标准"], "explanation": "本题考查实践是检验真理的唯一标准。题干直接说“真理的标准只能是社会的实践”，对应 D。"}, {"id": "q072", "chapter": "第二章", "number": 17, "sourceLine": 668, "stem": "实践作为检验真理的标准，既是确定的又是不确定的，其不确定性是因为（ ）。", "options": {"A": "有些真理是根本无法通过实践来加以检验的", "B": "任何实践检验都需要一定的逻辑证明作为其补充的手段", "C": "任何实践都会受到主客观条件的制约", "D": "不同的人，不同的阶级各有其不同的实践标准"}, "answer": "C", "answerText": "任何实践都会受到主客观条件的制约", "keywords": ["实践", "任何实践都会受到主客观条件的制约"], "explanation": "本题考查实践标准的不确定性。实践检验会受历史条件、主客观条件限制，所以具有不确定性。"}, {"id": "q073", "chapter": "第二章", "number": 18, "sourceLine": 673, "stem": "习近平指出：“我们党现阶段提出和实施的理论和路线方针政策，之所以正确，就是因为它们都是以我国现时代的社会存在为基础的。”这段话说明（ ）。", "options": {"A": "实践是认识的来源", "B": "实践是认识的发展动力", "C": "实践是认识的目的", "D": "实践是检验认识真理性的唯一标准"}, "answer": "A", "answerText": "实践是认识的来源", "keywords": ["社会存在", "实践", "认识", "实践是认识的来源"], "explanation": "本题考查实践是认识的来源。理论和路线方针以现实社会存在为基础，说明正确认识来源于现实实践基础。"}, {"id": "q074", "chapter": "第二章", "number": 19, "sourceLine": 678, "stem": "习近平指出“……实践如果没有正确理论的指导，也容易盲人骑瞎马夜半临深池”说明（ ）。", "options": {"A": "实践对理论有决定作用", "B": "理论创新为实践创新提供科学的行动指南", "C": "理论比实践更为重要", "D": "实践比理论重要"}, "answer": "B", "answerText": "理论创新为实践创新提供科学的行动指南", "keywords": ["理论创新", "实践", "理论创新为实践创新提供科学的行动指南"], "explanation": "本题考查理论对实践的指导作用。题干强调没有正确理论指导，实践会迷失方向，所以选“理论创新为实践创新提供科学的行动指南”。"}, {"id": "q075", "chapter": "第二章", "number": 20, "sourceLine": 683, "stem": "某一认识成为真理的决定性条件，并不在于它采取何种主观形式，而在于它（ ）。", "options": {"A": "是不是被大多数人所接受", "B": "能正确地反映对象的本质和规律", "C": "是不是具有绝对性", "D": "是不是能够满足人的需要"}, "answer": "B", "answerText": "能正确地反映对象的本质和规律", "keywords": ["真理", "认识", "能正确地反映对象的本质和规律"], "explanation": "本题考查真理的决定性条件。认识是否成真理，关键不在形式或人数，而在能否正确反映对象本质和规律。"}, {"id": "q076", "chapter": "第二章", "number": 21, "sourceLine": 688, "stem": "轻视感性认识而片面夸大理性认识的作用，会导致（ ）。", "options": {"A": "宿命论", "B": "唯理论", "C": "诡辩论", "D": "经验论"}, "answer": "B", "answerText": "唯理论", "keywords": ["认识", "唯理论"], "explanation": "本题考查感性认识与理性认识。轻视感性、片面夸大理性，会走向唯理论；反过来片面夸大经验才是经验论。"}, {"id": "q077", "chapter": "第二章", "number": 22, "sourceLine": 693, "stem": "真理与谬误之间的相互关系是（ ）。", "options": {"A": "在任何情况下都是绝对对立的", "B": "没有相互转化的可能性", "C": "在一定条件下能够相互转化", "D": "两者之间没有原则区别"}, "answer": "C", "answerText": "在一定条件下能够相互转化", "keywords": ["真理", "在一定条件下能够相互转化"], "explanation": "本题考查真理和谬误的辩证关系。二者有原则区别，但在一定条件下可以相互转化。"}, {"id": "q078", "chapter": "第二章", "number": 23, "sourceLine": 698, "stem": "对马克思主义既要坚持，又要在实践中丰富和发展。这种正确态度的理论基础是（ ）。", "options": {"A": "认识是主体对客体的能动反映的原理", "B": "实践是认识的来源和目的原理", "C": "真理的绝对性和真理的相对性统一的原理", "D": "能动的反映是摹写和创造相统一的原理"}, "answer": "C", "answerText": "真理的绝对性和真理的相对性统一的原理", "keywords": ["马克思主义", "真理", "真理的绝对性和真理的相对性统一的原理"], "explanation": "本题考查真理绝对性和相对性统一。坚持马克思主义体现真理的绝对性，发展马克思主义体现真理的相对性和开放性。"}, {"id": "q079", "chapter": "第二章", "number": 24, "sourceLine": 703, "stem": "真理的相对性是指（ ）。", "options": {"A": "不含有绝对性质的真理", "B": "包含有错误因素的真理", "C": "人们在一定条件下对客观事物及其本质和发展规律的正确认识总是有限度的、不完善的", "D": "暂时正确的真理"}, "answer": "C", "answerText": "人们在一定条件下对客观事物及其本质和发展规律的正确认识总是有限度的、不完善的", "keywords": ["真理", "认识"], "explanation": "本题考查真理相对性的含义。相对性不是说真理包含错误，而是说一定条件下的正确认识总是有限和不完善的。"}, {"id": "q080", "chapter": "第二章", "number": 25, "sourceLine": 708, "stem": "马克思说过:“蜜蜂建筑蜂房的本领使人间的许多建筑师感到惭愧。但是，最鳖脚的建筑师从一开始就比最灵巧的蜜蜂高明的地方，是他在用蜂蜡建筑蜂房以前，已经在自己的头脑中把它建成了。”说的是实践具有（ ）。", "options": {"A": "普遍性", "B": "绝对性", "C": "客观实在性", "D": "自觉能动性"}, "answer": "D", "answerText": "自觉能动性", "keywords": ["实践", "自觉能动性"], "explanation": "本题考查实践的自觉能动性。建筑师先在头脑中构思再实践，说明人的实践是有目的、有计划的能动活动。"}, {"id": "q081", "chapter": "第二章", "number": 26, "sourceLine": 710, "stem": "理性认识是关于事物的（ ）。", "options": {"A": "本质、全体、内部联系和事物自身规律性的认识", "B": "外部联系的片面反映", "C": "生动具体的外部形象的反映", "D": "现象的直观反映"}, "answer": "A", "answerText": "本质、全体、内部联系和事物自身规律性的认识", "keywords": ["联系", "认识"], "explanation": "本题考查理性认识。理性认识把握事物的本质、全体、内部联系和规律性，不停留于现象直观。"}, {"id": "q082", "chapter": "第二章", "number": 27, "sourceLine": 715, "stem": "辩证唯物主义认为，认识的主体和客体的关系（ ）。", "options": {"A": "只是反映与被反映的关系", "B": "只是改造与被改造的关系", "C": "是指导和被指导的关系", "D": "不仅是认识和被认识的关系，而且首先是改造和被改造的关系"}, "answer": "D", "answerText": "不仅是认识和被认识的关系，而且首先是改造和被改造的关系", "keywords": ["实践", "认识"], "explanation": "本题考查主体客体关系。二者不仅是认识和被认识，更首先是在实践中改造和被改造的关系。"}, {"id": "q083", "chapter": "第二章", "number": 28, "sourceLine": 720, "stem": "认识的过程首先是从实践到认识的过程。这个过程主要表现为在实践基础上认识活动由感性认识能动地飞跃到理性认识，也就是“从生动的直观到抽象的思维”,这是认识运动的（ ）。", "options": {"A": "第一次飞跃", "B": "第二次飞跃", "C": "第三次飞跃", "D": "第四次飞跃"}, "answer": "A", "answerText": "第一次飞跃", "keywords": ["实践", "认识", "第一次飞跃"], "explanation": "本题考查认识运动第一次飞跃。从实践到认识、从感性认识到理性认识，是认识过程的第一次飞跃。"}, {"id": "q084", "chapter": "第二章", "number": 29, "sourceLine": 722, "stem": "从实践到认识，再从认识到实践，实现了人们认识具体事物的辩证运动过程。经历了两次飞跃，实践与认识的运动就算完成了吗?回答是（ ）。", "options": {"A": "完成了", "B": "没有完成", "C": "依具体情况而定", "D": "既完成了，又没有完成"}, "answer": "D", "answerText": "既完成了，又没有完成", "keywords": ["实践", "认识", "既完成了，又没有完成"], "explanation": "本题考查认识过程的反复性。两次飞跃对一个具体认识过程可算完成，但实践和认识又会继续循环发展。"}, {"id": "q085", "chapter": "第二章", "number": 30, "sourceLine": 727, "stem": "真理尺度与价值尺度是否达到了具体的、历史的统一，必须通过（ ）来验证。", "options": {"A": "感性认识", "B": "自由", "C": "理性认识", "D": "实践"}, "answer": "D", "answerText": "实践", "keywords": ["实践", "真理"], "explanation": "本题考查真理尺度和价值尺度的统一。二者是否统一，不能靠主观判断，必须通过实践检验。"}, {"id": "q086", "chapter": "第二章", "number": 31, "sourceLine": 732, "stem": "谬误与真理的关系是对立统一的,因此谬误（ ）。", "options": {"A": "永远也不能变为真理", "B": "在一定条件下能够向真理转化", "C": "是对客观事物的正确反映", "D": "含在相对真理之中的"}, "answer": "B", "answerText": "在一定条件下能够向真理转化", "keywords": ["真理", "认识", "在一定条件下能够向真理转化"], "explanation": "本题考查真理和谬误转化。谬误不是真理，但在一定条件下可以被纠正、转化为真理性认识。"}, {"id": "q087", "chapter": "第二章", "number": 32, "sourceLine": 737, "stem": "实践的主体、客体和（ ）是实践活动的三项基本要素。", "options": {"A": "工具", "B": "手段", "C": "语言", "D": "中介"}, "answer": "D", "answerText": "中介", "keywords": ["实践", "中介"], "explanation": "本题考查实践三要素。实践活动包括主体、客体和中介，中介通常指工具、手段、语言符号等系统。"}, {"id": "q088", "chapter": "第二章", "number": 33, "sourceLine": 742, "stem": "习近平提出：“要根据时代变化和实践发展，不断深化认识，不断总结经验，不断进行理论创新，坚持理论指导和实践探索辩证统一，实现理论创新和实践创新良性互动，在这种统一和互动中发展二十一世纪中国的马克思主义。”这一论述从理论上深刻揭示了（ ）的内在联系。", "options": {"A": "理论创新与实践创新", "B": "真理与谬误", "C": "实践与认识", "D": "真理与价值"}, "answer": "A", "answerText": "理论创新与实践创新", "keywords": ["理论创新", "联系", "实践", "理论创新与实践创新"], "explanation": "本题考查理论创新和实践创新关系。题干反复说理论指导、实践探索、二者良性互动，核心就是理论创新与实践创新的内在联系。"}, {"id": "q089", "chapter": "第三章", "number": 1, "sourceLine": 936, "stem": "社会历史观的基本问题是（ ）", "options": {"A": "存在和思维的关系问题", "B": "认识和实践的关系问题", "C": "社会存在与社会意识的关系问题", "D": "运动和静止的关系问题"}, "answer": "C", "answerText": "社会存在与社会意识的关系问题", "keywords": ["哲学基本问题", "社会存在", "意识", "社会存在与社会意识的关系问题"], "explanation": "本题考查社会历史观基本问题。哲学基本问题在历史观中的表现，是社会存在和社会意识的关系问题。"}, {"id": "q090", "chapter": "第三章", "number": 2, "sourceLine": 939, "stem": "社会存在和发展的基础及决定力量是（ ）", "options": {"A": "人口因素", "B": "自然地理环境", "C": "国家政权", "D": "物质生产方式"}, "answer": "D", "answerText": "物质生产方式", "keywords": ["社会存在", "物质", "物质生产方式"], "explanation": "本题考查物质生产方式。物质生产方式是社会存在和发展的基础，决定社会生活的基本面貌。"}, {"id": "q091", "chapter": "第三章", "number": 3, "sourceLine": 941, "stem": "国家的实质是（ ）", "options": {"A": "一个阶级统治另一个阶级的工具", "B": "各阶级利益的调解者", "C": "人们相互约定的组织", "D": "整个社会的代表者"}, "answer": "A", "answerText": "一个阶级统治另一个阶级的工具", "keywords": ["第三章", "一个阶级统治另一个阶级的工具"], "explanation": "本题考查国家本质。国家不是超阶级调解者，而是一个阶级统治另一个阶级的工具。"}, {"id": "q092", "chapter": "第三章", "number": 4, "sourceLine": 944, "stem": "经济基础是（ ）", "options": {"A": "一定历史阶段上生产力和生产关系的总和", "B": "一定历史阶段上经济基础和上层建筑的总和", "C": "一定历史阶段上科学技术和经济管理的总和", "D": "一定发展阶段的生产力所决定的生产关系的总和"}, "answer": "D", "answerText": "一定发展阶段的生产力所决定的生产关系的总和", "keywords": ["经济基础", "生产力"], "explanation": "本题考查经济基础。经济基础是由一定发展阶段的生产力所决定的生产关系的总和。"}, {"id": "q093", "chapter": "第三章", "number": 5, "sourceLine": 949, "stem": "（ ）是人类社会生存和发展永恒的、必要的条件，是人们生活和生产的自然基础。", "options": {"A": "人口因素", "B": "自然地理环境", "C": "物质生产方式", "D": "国家政权"}, "answer": "B", "answerText": "自然地理环境", "keywords": ["社会存在", "自然地理环境"], "explanation": "本题考查自然地理环境。它是人们生活和生产的自然基础，是社会存在发展的必要条件，但不是决定力量。"}, {"id": "q094", "chapter": "第三章", "number": 6, "sourceLine": 951, "stem": "（ ）是人类社会赖以存在和发展的基础，是人类其他一切活动的首要前提。", "options": {"A": "自然地理环境", "B": "人口因素", "C": "物质生产方式", "D": "国家政权"}, "answer": "C", "answerText": "物质生产方式", "keywords": ["物质", "物质生产方式"], "explanation": "本题考查物质生产方式。人类要生存首先要生产生活资料，所以物质生产方式是一切活动的首要前提。"}, {"id": "q095", "chapter": "第三章", "number": 7, "sourceLine": 953, "stem": "（ ）是通过塑造具体生动的形象来反映社会生活的社会意识形式。", "options": {"A": "政治法律思想", "B": "道德", "C": "艺术", "D": "宗教"}, "answer": "C", "answerText": "艺术", "keywords": ["意识", "艺术"], "explanation": "本题考查社会意识形式。艺术通过具体生动的形象反映社会生活，区别于政治法律思想、道德和宗教。"}, {"id": "q096", "chapter": "第三章", "number": 8, "sourceLine": 955, "stem": "人口因素对社会发展的作用表现在（ ）", "options": {"A": "人口增长是引起革命的根源", "B": "人口增长是资本主义社会劳动者贫困失业的根源", "C": "人口因素对社会发展可以起加速或延缓作用", "D": "人口因素是社会进步的决定力量"}, "answer": "C", "answerText": "人口因素对社会发展可以起加速或延缓作用", "keywords": ["第三章"], "explanation": "本题考查人口因素。人口因素能加速或延缓社会发展，但不能决定社会制度和社会进步方向。"}, {"id": "q097", "chapter": "第三章", "number": 9, "sourceLine": 960, "stem": "“英雄创造历史”，这个观点的实质是（ ）", "options": {"A": "唯物史观", "B": "唯心史观", "C": "经验主义", "D": "自然主义"}, "answer": "B", "answerText": "唯心史观", "keywords": ["第三章", "唯心史观"], "explanation": "本题考查唯心史观。“英雄创造历史”把历史决定力量归结为少数英雄，实质是唯心史观。"}, {"id": "q098", "chapter": "第三章", "number": 10, "sourceLine": 962, "stem": "上层建筑由两部分组成，即（ ）", "options": {"A": "政治法律制度与军队警察等武装力量", "B": "生产关系和政治制度", "C": "政权和政治法律制度及其设施", "D": "政治上层建筑和观念上层建筑"}, "answer": "D", "answerText": "政治上层建筑和观念上层建筑", "keywords": ["第三章", "政治上层建筑和观念上层建筑"], "explanation": "本题考查上层建筑构成。上层建筑包括政治上层建筑和观念上层建筑两部分。"}, {"id": "q099", "chapter": "第三章", "number": 11, "sourceLine": 965, "stem": "经济基础决定上层建筑，就是说（ ）", "options": {"A": "一切社会的上层建筑都要在它的经济基础建立之后才能产生", "B": "一切社会的上层建筑都根源于经济基础", "C": "一切社会的上层建筑的变化都是同经济基础变化同步的", "D": "社会中一切经济基础成分都决定着社会的上层建筑性质"}, "answer": "B", "answerText": "一切社会的上层建筑都根源于经济基础", "keywords": ["经济基础", "一切社会的上层建筑都根源于经济基础"], "explanation": "本题考查经济基础决定上层建筑。上层建筑根源于经济基础，但变化不一定与经济基础完全同步。"}, {"id": "q100", "chapter": "第三章", "number": 12, "sourceLine": 970, "stem": "社会基本矛盾是（ ）", "options": {"A": "社会存在与社会意识的矛盾", "B": "物质生产和精神生产的矛盾", "C": "生产和消费的矛盾", "D": "生产力与生产关系、经济基础与上层建筑之间的矛盾"}, "answer": "D", "answerText": "生产力与生产关系、经济基础与上层建筑之间的矛盾", "keywords": ["经济基础", "生产力", "矛盾"], "explanation": "本题考查社会基本矛盾。社会基本矛盾是生产力与生产关系、经济基础与上层建筑之间的矛盾。"}, {"id": "q101", "chapter": "第三章", "number": 13, "sourceLine": 975, "stem": "（ ）是人类在生产实践中形成的改造和影响自然以使其适合社会需要的物质力量。", "options": {"A": "生产力", "B": "生产关系", "C": "社会存在", "D": "社会意识"}, "answer": "A", "answerText": "生产力", "keywords": ["生产力", "物质"], "explanation": "本题考查生产力概念。生产力是人类改造和影响自然，使其适合社会需要的物质力量。"}, {"id": "q102", "chapter": "第三章", "number": 14, "sourceLine": 977, "stem": "生产关系所体现的是生产过程中（ ）", "options": {"A": "人与自然的关系", "B": "人与人的政治关系", "C": "人与人的思想关系", "D": "人与人的经济关系"}, "answer": "D", "answerText": "人与人的经济关系", "keywords": ["第三章", "人与人的经济关系"], "explanation": "本题考查生产关系。生产关系体现的是生产过程中人与人之间的经济关系。"}, {"id": "q103", "chapter": "第三章", "number": 15, "sourceLine": 982, "stem": "上层建筑对社会发展的作用性质取决于它（ ）", "options": {"A": "是否符合经济基础的要求", "B": "是否符合统治阶级的愿望", "C": "是否推动经济基础的发展", "D": "所服务的经济基础的性质"}, "answer": "D", "answerText": "所服务的经济基础的性质", "keywords": ["经济基础", "所服务的经济基础的性质"], "explanation": "本题考查上层建筑反作用。上层建筑作用是进步还是阻碍，取决于它所服务的经济基础性质。"}, {"id": "q104", "chapter": "第三章", "number": 16, "sourceLine": 985, "stem": "生产力和生产关系、经济基础和上层建筑这两对社会基本矛盾的关系是（ ）", "options": {"A": "前者和后者相互决定、相互制约", "B": "前者和后者并行不悖", "C": "以后者为基础，推动前者矛盾的解决", "D": "以前者为基础，两者相互制约，互相作用"}, "answer": "D", "answerText": "以前者为基础，两者相互制约，互相作用", "keywords": ["经济基础", "生产力", "矛盾", "以前者为基础，两者相互制约，互相作用"], "explanation": "本题考查两对社会基本矛盾关系。生产力与生产关系是更基础的矛盾，并制约经济基础与上层建筑的矛盾运动。"}, {"id": "q105", "chapter": "第三章", "number": 17, "sourceLine": 990, "stem": "（ ）是先进生产力的集中体现和主要标志，是第一生产力。", "options": {"A": "社会存在", "B": "生产关系", "C": "劳动工具", "D": "科学技术"}, "answer": "D", "answerText": "科学技术", "keywords": ["生产力", "科学技术"], "explanation": "本题考查科学技术。科学技术是先进生产力的集中体现和主要标志，也是第一生产力。"}, {"id": "q106", "chapter": "第三章", "number": 18, "sourceLine": 992, "stem": "人民群众创造历史总要受到社会历史条件的制约，其根本的条件是指（ ）", "options": {"A": "生产力和生产关系的状况", "B": "人们头脑中的传统观念", "C": "科学文化的发展情况", "D": "人们的社会关系水平"}, "answer": "A", "answerText": "生产力和生产关系的状况", "keywords": ["人民群众", "生产力", "生产力和生产关系的状况"], "explanation": "本题考查人民群众创造历史的条件。人民群众创造历史受条件制约，其中根本条件是生产力和生产关系状况。"}, {"id": "q107", "chapter": "第三章", "number": 19, "sourceLine": 997, "stem": "划分唯物史观和唯心史观的根本标准是（ ）", "options": {"A": "是否承认社会存在决定社会意识", "B": "是否承认社会意识具有相对独立性", "C": "是否承认社会发展具有规律性", "D": "是否承认阶级和阶级斗争"}, "answer": "A", "answerText": "是否承认社会存在决定社会意识", "keywords": ["社会存在", "唯物史观", "意识", "是否承认社会存在决定社会意识"], "explanation": "本题考查唯物史观和唯心史观标准。是否承认社会存在决定社会意识，是划分二者的根本标准。"}, {"id": "q108", "chapter": "第三章", "number": 20, "sourceLine": 1002, "stem": "（ ）是指社会各阶级在国家中的地位，表明国家政权掌握在哪个阶级手里，哪个阶级是统治阶级、哪个阶级是被统治阶级。", "options": {"A": "国体", "B": "政体", "C": "国家", "D": "民主"}, "answer": "A", "answerText": "国体", "keywords": ["第三章", "国体"], "explanation": "本题考查国体。国体说明国家政权掌握在哪个阶级手里，即国家的阶级性质。"}, {"id": "q109", "chapter": "第三章", "number": 21, "sourceLine": 1007, "stem": "（ ）是经济上占会配地位的阶级为维护其根本利益而建立起来的强制性的暴力机关。", "options": {"A": "国家", "B": "阶级", "C": "国体", "D": "政体"}, "answer": "A", "answerText": "国家", "keywords": ["第三章", "国家"], "explanation": "本题考查国家概念。国家是经济上占支配地位的阶级维护根本利益的强制性暴力机关。"}, {"id": "q110", "chapter": "第三章", "number": 22, "sourceLine": 1009, "stem": "（ ）是指社会各阶级在国家中的地位，表明国家政权掌握在哪个阶级手里。", "options": {"A": "国家", "B": "阶级", "C": "国体", "D": "政体"}, "answer": "C", "answerText": "国体", "keywords": ["第三章", "国体"], "explanation": "本题再次考查国体。表明国家政权掌握在哪个阶级手里，就是国体问题。"}, {"id": "q111", "chapter": "第三章", "number": 23, "sourceLine": 1011, "stem": "（ ）是指统治阶级实现其阶级统治的具体组织形式，也是政治构成形式。", "options": {"A": "国家", "B": "阶级", "C": "国体", "D": "政体"}, "answer": "D", "answerText": "政体", "keywords": ["第三章", "政体"], "explanation": "本题考查政体。政体是统治阶级实现阶级统治的具体组织形式，即政权组织形式。"}, {"id": "q112", "chapter": "第三章", "number": 24, "sourceLine": 1013, "stem": "（ ）是指在一定历史条件下的现实的个人、群众、阶级、民族、国家之间在物质和精神上相互往来、相互作用、彼此联系的活动。", "options": {"A": "文明", "B": "交往", "C": "守正", "D": "创新"}, "answer": "B", "answerText": "交往", "keywords": ["物质", "联系", "交往"], "explanation": "本题考查交往。题干强调个人、群众、阶级、民族、国家之间相互往来和作用，对应交往。"}, {"id": "q113", "chapter": "第三章", "number": 25, "sourceLine": 1015, "stem": "（ ）是人类创造的所有物质成果、精神成果和制度成果的总和，是标志社会进步程度的范畴。", "options": {"A": "文明", "B": "交往", "C": "守正", "D": "创新"}, "answer": "A", "answerText": "文明", "keywords": ["物质", "文明"], "explanation": "本题考查文明。文明是人类创造的物质成果、精神成果和制度成果的总和，标志社会进步程度。"}, {"id": "q114", "chapter": "第三章", "number": 26, "sourceLine": 1017, "stem": "区分不同生产方式、判定社会经济结构性质的客观依据是（ ）", "options": {"A": "生产关系", "B": "产品的分配关系", "C": "生产资料所有制关系", "D": "生产中人与人的关系"}, "answer": "C", "answerText": "生产资料所有制关系", "keywords": ["第三章", "生产资料所有制关系"], "explanation": "本题考查生产资料所有制。它是生产关系的基础，是区分生产方式和社会经济结构性质的客观依据。"}, {"id": "q115", "chapter": "第三章", "number": 27, "sourceLine": 1022, "stem": "由意识形态和政治法律制度及设施、政治组织等两部分构成的上层建筑建立在（ ）", "options": {"A": "一定的物质基础之上", "B": "一定的制度基础之上", "C": "一定的文明基础之上", "D": "一定的经济基础之上"}, "answer": "D", "answerText": "一定的经济基础之上", "keywords": ["经济基础", "意识", "一定的经济基础之上"], "explanation": "本题考查上层建筑基础。上层建筑由意识形态、政治法律制度和设施等构成，建立在一定经济基础之上。"}, {"id": "q116", "chapter": "第三章", "number": 28, "sourceLine": 1025, "stem": "社会意识相对独立性的突出表现是（ ）", "options": {"A": "社会意识的历史继承性", "B": "各种社会意识之间的相互影响", "C": "社会意识对社会存在具有能动的反作用", "D": "社会意识对社会存在变化上的滞后性"}, "answer": "C", "answerText": "社会意识对社会存在具有能动的反作用", "keywords": ["社会存在", "意识", "社会意识对社会存在具有能动的反作用"], "explanation": "本题考查社会意识相对独立性的突出表现。最突出的是社会意识能动反作用于社会存在。"}, {"id": "q117", "chapter": "第三章", "number": 29, "sourceLine": 1030, "stem": "我国社会主义初级阶段实行以公有制为主体、多种所有制经济共同发展的基本经济制度，促进了生产力的发展，说明实行这种制度遵循了（ ）", "options": {"A": "生产力决定生产关系的原理", "B": "经济基础决定上层建筑的原理", "C": "生产力具有自我增值能力的原理", "D": "社会经济制度决定生产力状况的原理"}, "answer": "A", "answerText": "生产力决定生产关系的原理", "keywords": ["生产力", "生产力决定生产关系的原理"], "explanation": "本题考查生产力决定生产关系。我国基本经济制度促进生产力发展，说明生产关系要适合生产力状况。"}, {"id": "q118", "chapter": "第三章", "number": 30, "sourceLine": 1035, "stem": "（ ）是社会基本矛盾在阶级社会中的表现。", "options": {"A": "守正创新", "B": "阶级斗争", "C": "科技革命", "D": "改革改良"}, "answer": "B", "answerText": "阶级斗争", "keywords": ["矛盾", "阶级斗争"], "explanation": "本题考查阶级斗争。阶级社会中，社会基本矛盾集中表现为阶级斗争。"}, {"id": "q119", "chapter": "第三章", "number": 31, "sourceLine": 1037, "stem": "改革在人类历史上具有普遍性，它是（ ）", "options": {"A": "社会制度更替的一种形式", "B": "是社会制度的自我完善和发展", "C": "统治阶级向被统治阶级妥协", "D": "革命阶级发动对反动阶级的斗争"}, "answer": "B", "answerText": "是社会制度的自我完善和发展", "keywords": ["第三章", "是社会制度的自我完善和发展"], "explanation": "本题考查改革。改革不是社会制度根本更替，而是社会制度的自我完善和发展。"}, {"id": "q120", "chapter": "第三章", "number": 32, "sourceLine": 1042, "stem": "（ ）是社会基本矛盾所引起的广泛而深刻的社会变革的统称。", "options": {"A": "社会革命", "B": "意识形态", "C": "科技革命", "D": "改革改良"}, "answer": "A", "answerText": "社会革命", "keywords": ["矛盾", "社会革命"], "explanation": "本题考查社会革命。由社会基本矛盾引起的广泛而深刻的社会变革，称为社会革命。"}, {"id": "q121", "chapter": "第三章", "number": 33, "sourceLine": 1044, "stem": "美国跨越了奴隶社会和封建社会，从原始社会直接过渡到资本主义社会；日耳曼人没有经过奴隶社会而直接过渡到封建社会；中国一些少数民族由前资本主义社会直接过渡到社会主义社会。这些历史事实说明（ ）", "options": {"A": "五种社会形态划分的理论是错误的", "B": "社会形态更替没有任何规律可以遵循", "C": "它们违背了历史发展规律", "D": "社会形态更替的形式具有多样性"}, "answer": "D", "answerText": "社会形态更替的形式具有多样性", "keywords": ["社会主义", "资本", "社会形态更替的形式具有多样性"], "explanation": "本题考查社会形态更替形式。不同民族历史道路不完全相同，说明社会形态更替形式具有多样性。"}, {"id": "q122", "chapter": "第三章", "number": 34, "sourceLine": 1049, "stem": "（ ）蕴含着人类的思想智慧、价值追求和审美情趣，是一个国家、一个民族的灵魂。", "options": {"A": "文化", "B": "科技", "C": "思维", "D": "存在"}, "answer": "A", "answerText": "文化", "keywords": ["第三章", "文化"], "explanation": "本题考查文化地位。文化蕴含思想智慧、价值追求和审美情趣，是国家和民族的灵魂。"}, {"id": "q123", "chapter": "第三章", "number": 35, "sourceLine": 1051, "stem": "社会意识的（ ）是指，社会意识在从根本上受到社会存在决定的同时，还具有自身特有的发展形式和发展规律。", "options": {"A": "直接现实性", "B": "相对性", "C": "决定性", "D": "相对独立性"}, "answer": "D", "answerText": "相对独立性", "keywords": ["社会存在", "意识", "相对独立性"], "explanation": "本题考查社会意识相对独立性。社会意识受社会存在决定，同时又有自身发展形式和规律，这叫相对独立性。"}, {"id": "q124", "chapter": "第四章", "number": 1, "sourceLine": 1265, "stem": "社会经济的两种基本形态是（ ）。", "options": {"A": "商品经济和市场经济", "B": "公有制经济和非公有制经济", "C": "自然经济和商品经济", "D": "计划经济和自然经济"}, "answer": "C", "answerText": "自然经济和商品经济", "keywords": ["商品", "自然经济和商品经济"], "explanation": "本题考查社会经济基本形态。社会经济形态从交换关系看，基本可分为自然经济和商品经济。"}, {"id": "q125", "chapter": "第四章", "number": 2, "sourceLine": 1270, "stem": "商品经济产生和发展的重要条件是（ ）。", "options": {"A": "自然经济的存在和发展", "B": "社会化大生产和资本主义私有制", "C": "社会化大生产和社会主义公有制", "D": "生产资料和劳动产品属于不同所有者"}, "answer": "D", "answerText": "生产资料和劳动产品属于不同所有者", "keywords": ["商品", "生产资料和劳动产品属于不同所有者"], "explanation": "本题考查商品经济产生条件。商品经济需要社会分工，还要求生产资料和劳动产品属于不同所有者。"}, {"id": "q126", "chapter": "第四章", "number": 3, "sourceLine": 1275, "stem": "两种商品可以按一定比例相互交换的原因，在于它们（ ）。", "options": {"A": "有不同的使用价值", "B": "都是具体劳动的产物", "C": "对人们有共同的效应", "D": "在生产中都耗费了一般的人类劳动"}, "answer": "D", "answerText": "在生产中都耗费了一般的人类劳动", "keywords": ["商品", "在生产中都耗费了一般的人类劳动"], "explanation": "本题考查商品交换基础。不同商品能按比例交换，是因为其中都耗费了一般人类劳动，形成价值。"}, {"id": "q127", "chapter": "第四章", "number": 4, "sourceLine": 1280, "stem": "生产商品的劳动分具体劳动和抽象劳动，其中具体劳动的作用是（ ）。", "options": {"A": "创造新价值", "B": "创造剩余价值", "C": "创造必要价值", "D": "创造使用价值"}, "answer": "D", "answerText": "创造使用价值", "keywords": ["商品", "创造使用价值"], "explanation": "本题考查具体劳动。具体劳动创造商品的使用价值，抽象劳动才形成商品价值。"}, {"id": "q128", "chapter": "第四章", "number": 5, "sourceLine": 1285, "stem": "生产商品的劳动二重性即具体劳动和抽象劳动是指（ ）。", "options": {"A": "两种独立存在的劳动", "B": "同一劳动过程中先后出现的两种不同劳动", "C": "同一劳动过程的两个方面", "D": "不同劳动过程的不同劳动形式"}, "answer": "C", "answerText": "同一劳动过程的两个方面", "keywords": ["商品", "同一劳动过程的两个方面"], "explanation": "本题考查劳动二重性。具体劳动和抽象劳动不是两次劳动，而是同一劳动过程的两个方面。"}, {"id": "q129", "chapter": "第四章", "number": 6, "sourceLine": 1290, "stem": "决定商品价值量的社会必要劳动时间（ ）。", "options": {"A": "以抽象劳动为尺度", "B": "以私人劳动为尺度", "C": "以剩余劳动为尺度", "D": "以简单劳动为尺度"}, "answer": "D", "answerText": "以简单劳动为尺度", "keywords": ["商品", "以简单劳动为尺度"], "explanation": "本题考查商品价值量。社会必要劳动时间以简单劳动为尺度来计量复杂劳动折合后的劳动量。"}, {"id": "q130", "chapter": "第四章", "number": 7, "sourceLine": 1295, "stem": "货币最基本的职能是（ ）。", "options": {"A": "世界货币与贮藏手段", "B": "贮藏手段与支付手段", "C": "价值尺度与流通手段", "D": "支付手段与流通手段"}, "answer": "C", "answerText": "价值尺度与流通手段", "keywords": ["第四章", "价值尺度与流通手段"], "explanation": "本题考查货币基本职能。货币最基本的职能是价值尺度和流通手段。"}, {"id": "q131", "chapter": "第四章", "number": 8, "sourceLine": 1300, "stem": "商品内在的使用价值和价值的矛盾，其完备的外在表现（ ）。", "options": {"A": "商品和商品之间的对立", "B": "具体劳动和抽象劳动之间的对立", "C": "资本和劳动之间的对立", "D": "商品和货币之间的对立"}, "answer": "D", "answerText": "商品和货币之间的对立", "keywords": ["矛盾", "商品", "商品和货币之间的对立"], "explanation": "本题考查商品矛盾的外在表现。使用价值和价值的矛盾，在商品交换中外化为商品和货币的对立。"}, {"id": "q132", "chapter": "第四章", "number": 9, "sourceLine": 1305, "stem": "商品的二因素是对立的统一的，这对矛盾解决有赖于（ ）。", "options": {"A": "劳动生产率的不断提高", "B": "货币的出现并充当交换媒介", "C": "商品的出现", "D": "商品物质实体的消亡"}, "answer": "B", "answerText": "货币的出现并充当交换媒介", "keywords": ["矛盾", "商品", "货币的出现并充当交换媒介"], "explanation": "本题考查商品二因素矛盾的解决。商品要实现价值，需要货币作为交换媒介。"}, {"id": "q133", "chapter": "第四章", "number": 10, "sourceLine": 1310, "stem": "在市场经济中，某品牌手机因技术创新、性能提升导致市场需求大增，价格持续上涨。其他手机厂商纷纷跟进研发类似技术。这一现象体现了价值规律的哪种作用？（ ）", "options": {"A": "自发刺激社会生产力的发展", "B": "调节社会资源在各部门的分配", "C": "促使商品生产者优胜劣汰", "D": "实现商品交换的等价原则"}, "answer": "B", "answerText": "调节社会资源在各部门的分配", "keywords": ["价值规律", "调节社会资源在各部门的分配"], "explanation": "本题考查价值规律调节资源配置。价格上涨吸引其他厂商跟进，说明资源流向该部门，体现调节社会资源分配。"}, {"id": "q134", "chapter": "第四章", "number": 11, "sourceLine": 1315, "stem": "以私有制为基础的商品经济的基本矛盾是（ ）。", "options": {"A": "私人劳动与社会劳动之间的矛盾", "B": "生产社会化与生产资料私有制的矛盾", "C": "具体劳动与抽象劳动的矛盾", "D": "使用价值与价值的矛盾"}, "answer": "A", "answerText": "私人劳动与社会劳动之间的矛盾", "keywords": ["矛盾", "商品", "私人劳动与社会劳动之间的矛盾"], "explanation": "本题考查私有制商品经济基本矛盾。私人劳动要通过交换转化为社会劳动，二者矛盾是基本矛盾。"}, {"id": "q135", "chapter": "第四章", "number": 12, "sourceLine": 1320, "stem": "理解马克思主义政治经济学的枢纽是（ ）。", "options": {"A": "剩余价值学说", "B": "生产价格理论", "C": "劳动二重性理论", "D": "劳动力商品理论"}, "answer": "C", "answerText": "劳动二重性理论", "keywords": ["商品", "劳动二重性理论"], "explanation": "本题考查劳动二重性理论。劳动二重性理论是理解商品二因素、价值形成和政治经济学的枢纽。"}, {"id": "q136", "chapter": "第四章", "number": 13, "sourceLine": 1325, "stem": "劳动力成为商品是（ ）。", "options": {"A": "一切社会经济制度共有的", "B": "简单商品经济的前提", "C": "自然经济转化为商品经济的决定性条件", "D": "货币转化为资本的前提条件"}, "answer": "D", "answerText": "货币转化为资本的前提条件", "keywords": ["剩余价值", "商品", "资本", "货币转化为资本的前提条件"], "explanation": "本题考查劳动力商品。劳动力成为商品，是货币转化为资本的前提，因为资本增殖来自劳动力创造剩余价值。"}, {"id": "q137", "chapter": "第四章", "number": 14, "sourceLine": 1330, "stem": "以生产资料形态存在的资本的是（ ）。", "options": {"A": "不变资本", "B": "可变资本", "C": "全部预付资本", "D": "部分预付资本"}, "answer": "A", "answerText": "不变资本", "keywords": ["资本", "不变资本"], "explanation": "本题考查不变资本。以生产资料形态存在的资本，在生产中转移原有价值，不发生价值增殖，叫不变资本。"}, {"id": "q138", "chapter": "第四章", "number": 15, "sourceLine": 1335, "stem": "用来购买劳动力的那部分资本是（ ）。", "options": {"A": "不变资本", "B": "可变资本", "C": "全部预付资本", "D": "部分预付资本"}, "answer": "B", "answerText": "可变资本", "keywords": ["剩余价值", "资本", "可变资本"], "explanation": "本题考查可变资本。购买劳动力的资本能带来剩余价值，因此叫可变资本。"}, {"id": "q139", "chapter": "第四章", "number": 16, "sourceLine": 1340, "stem": "某智能工厂引入自动化生产线，原本需要 100 名工人的车间，现仅需 10 名技术人员监控设备，生产效率提升 300%。该工厂通过这种方式获取的更多剩余价值属于（ ）。", "options": {"A": "绝对剩余价值", "B": "超额剩余价值", "C": "垄断剩余价值", "D": "相对剩余价值"}, "answer": "B", "answerText": "超额剩余价值", "keywords": ["剩余价值", "超额剩余价值"], "explanation": "本题考查超额剩余价值。个别企业采用先进技术、劳动生产率高于社会平均水平，由此获得的额外剩余价值是超额剩余价值。"}, {"id": "q140", "chapter": "第四章", "number": 17, "sourceLine": 1345, "stem": "相对剩余价值是（ ）。", "options": {"A": "个别资本家改进技术、提高劳动生产率的结果", "B": "社会劳动生产率普遍提高的结果", "C": "必要劳动时间不变，延长工作日的结果", "D": "工作日不变，缩短必要劳动时间的结果"}, "answer": "D", "answerText": "工作日不变，缩短必要劳动时间的结果", "keywords": ["剩余价值", "剩余劳动", "工作日不变，缩短必要劳动时间的结果"], "explanation": "本题考查相对剩余价值。工作日不变，通过缩短必要劳动时间来延长剩余劳动时间，就是相对剩余价值。"}, {"id": "q141", "chapter": "第四章", "number": 18, "sourceLine": 1350, "stem": "缩短必要劳动时间是通过（ ）实现的。", "options": {"A": "延长工作日，增加剩余劳动时间的结果", "B": "工作日不变，增加必要劳动时间获得的", "C": "全社会劳动生产率的提高", "D": "个别企业提高劳动生产率"}, "answer": "C", "answerText": "全社会劳动生产率的提高", "keywords": ["第四章", "全社会劳动生产率的提高"], "explanation": "本题考查必要劳动时间缩短的条件。必要劳动时间缩短依赖全社会劳动生产率提高，而不是个别企业单独提高。"}, {"id": "q142", "chapter": "第四章", "number": 19, "sourceLine": 1355, "stem": "资本主义生产的根本目的是（ ）。", "options": {"A": "促进生产力的发展", "B": "促进社会进步", "C": "增加社会财富", "D": "追求剩余价值"}, "answer": "D", "answerText": "追求剩余价值", "keywords": ["剩余价值", "资本", "追求剩余价值"], "explanation": "本题考查资本主义生产目的。资本主义生产的根本目的不是满足需要，而是追求剩余价值。"}, {"id": "q14 191", "chapter": "第七章", "number": 13, "sourceLine": 2095, "stem": "下列不属于共产主义的基本特征的是 （ ）。", "options": {"A": "社会财富极大丰富，消费品按需分配", "B": "社会关系高度和谐，人们的精神境界极大提高", "C": "每个人自由而全面的发展", "D": "任何社会分工都不存在"}, "answer": "D", "answerText": "任何社会分工都不存在", "keywords": ["共产主义"], "explanation": "本题考查共产主义基本特征。共产主义仍会有社会分工的新形式，不能说任何社会分工都不存在。"}, {"id": "q192", "chapter": "第七章", "number": 14, "sourceLine": 2100, "stem": "马克思主义经典著作中的共产主义社会第一阶段或低级阶段是指我们今天通常讲的（ ）。", "options": {"A": "向社会主义过渡时期", "B": "社会主义社会", "C": "社会主义的初级阶段", "D": "共产主义社会"}, "answer": "B", "answerText": "社会主义社会", "keywords": ["社会主义", "共产主义", "社会主义社会"], "explanation": "本题考查共产主义两个阶段。经典著作中的共产主义第一阶段或低级阶段，就是今天通常讲的社会主义社会。"}, {"id": "q193", "chapter": "第七章", "number": 15, "sourceLine": 2105, "stem": "列宁指出：马克思的全部理论，就是运用最彻底、最完整、最周密、内容最丰富的发展论去考察现代资本主义。自然，他也就要运用这个理论去考察资本主义的即将到来的崩溃和未来（ ）的未来发展。", "options": {"A": "资本主义", "B": "社会主义", "C": "社会主义和共产主义", "D": "共产主义"}, "answer": "D", "answerText": "共产主义", "keywords": ["马克思主义", "共产主义", "资本"], "explanation": "本题考查马克思主义对未来社会的考察。列宁说马克思用发展论考察资本主义崩溃和未来共产主义的发展。"}, {"id": "q194", "chapter": "第七章", "number": 16, "sourceLine": 2110, "stem": "共产主义社会实现的必要条件是 （ ）。", "options": {"A": "人的思想境界的极大提高", "B": "科学技术迅猛发展", "C": "社会生产力高度发展，产品极大丰富", "D": "无产阶级掌握国家政权"}, "answer": "C", "answerText": "社会生产力高度发展，产品极大丰富", "keywords": ["共产主义", "生产力", "物质", "社会生产力高度发展，产品极大丰富"], "explanation": "本题考查共产主义实现条件。共产主义需要社会生产力高度发展、产品极大丰富，这是必要物质条件。"}, {"id": "q195", "chapter": "第七章", "number": 17, "sourceLine": 2115, "stem": "马克思、恩格斯关于未来社会的预测，是在科学地批判和剖析（ ）的过程中作出的。", "options": {"A": "奴隶社会", "B": "封建社会", "C": "资本主义社会", "D": "社会主义社会"}, "answer": "C", "answerText": "资本主义社会", "keywords": ["资本", "资本主义社会"], "explanation": "本题考查未来社会预测方法。马克思、恩格斯是在科学批判和剖析资本主义社会中预测未来社会的。"}, {"id": "q196", "chapter": "第七章", "number": 18, "sourceLine": 2118, "stem": "以下对共产主义社会人的自由而全面的发展理解正确的是（ ）。", "options": {"A": "某一部分人的发展", "B": "指人可以随心所欲", "C": "人的自由而全面的发展是不可能实现的，那是臆想", "D": "全体社会成员的发展，即每一个人的发展"}, "answer": "D", "answerText": "全体社会成员的发展，即每一个人的发展", "keywords": ["自由全面发展", "全体社会成员的发展，即每一个人的发展"], "explanation": "本题考查人的自由全面发展。它不是少数人的发展，也不是随心所欲，而是全体社会成员、每一个人的发展。"}, {"id": "q197", "chapter": "第七章", "number": 19, "sourceLine": 2123, "stem": "共产主义社会，个人消费品的分配方式是（ ）。", "options": {"A": "各尽所能，按劳分配", "B": "各尽所能，按资分配", "C": "各尽所能，按需分配", "D": "实行有计划的分配"}, "answer": "C", "answerText": "各尽所能，按需分配", "keywords": ["共产主义", "按需分配", "各尽所能，按需分配"], "explanation": "本题考查共产主义个人消费品分配。共产主义社会实行各尽所能、按需分配。"}, {"id": "q198", "chapter": "第七章", "number": 20, "sourceLine": 2128, "stem": "共产主义新人的重要体现是 （ ）。", "options": {"A": "人们的精神境界得到极大提高", "B": "人们的劳动能力得到极大提高", "C": "人们的阶级觉悟得到极大提高", "D": "人们认识世界的能力得到极大提高"}, "answer": "A", "answerText": "人们的精神境界得到极大提高", "keywords": ["共产主义", "人们的精神境界得到极大提高"], "explanation": "本题考查共产主义新人。共产主义新人重要体现是精神境界极大提高。"}, {"id": "q199", "chapter": "第七章", "number": 21, "sourceLine": 2133, "stem": "共产主义社会，（ ）成为“生活的第一需要”。", "options": {"A": "消费", "B": "劳动", "C": "娱乐", "D": "和谐"}, "answer": "B", "answerText": "劳动", "keywords": ["共产主义", "劳动"], "explanation": "本题考查共产主义劳动性质。到共产主义社会，劳动不只是谋生手段，而成为生活的第一需要。"}, {"id": "q200", "chapter": "第七章", "number": 22, "sourceLine": 2135, "stem": "下列说法，错误的是（ ）。", "options": {"A": "实现共产主义是历史发展的必然趋势", "B": "共产主义社会是一种没有任何矛盾的社会", "C": "共产主义社会将在一个更高的基础上不断发展和前进", "D": "共产主义社会一定能够实现，这是由人类社会发展的客观规律决定的"}, "answer": "B", "answerText": "共产主义社会是一种没有任何矛盾的社会", "keywords": ["共产主义", "矛盾"], "explanation": "本题考查对共产主义社会的理解。共产主义仍有矛盾和发展，不是没有任何矛盾的静止社会。"}, {"id": "q201", "chapter": "第七章", "number": 23, "sourceLine": 2140, "stem": "马克思主义经典作家揭示了未来社会发展的（ ）。", "options": {"A": "具体细节", "B": "一般特征", "C": "具体阶段", "D": "特殊规律"}, "answer": "B", "answerText": "一般特征", "keywords": ["马克思主义", "一般特征"], "explanation": "本题考查经典作家对未来社会的揭示。马克思主义经典作家揭示的是未来社会一般特征，不是具体细节。"}, {"id": "q202", "chapter": "第七章", "number": 24, "sourceLine": 2143, "stem": "共产主义理想之所以能够实现，是因为它（ ）。", "options": {"A": "具有客观可能性", "B": "是人类向往的美好境界", "C": "具有客观必然性", "D": "是人类追求的目标"}, "answer": "C", "answerText": "具有客观必然性", "keywords": ["共产主义", "具有客观必然性"], "explanation": "本题考查共产主义理想能够实现的原因。它不是单纯美好愿望，而是符合社会发展规律，具有客观必然性。"}]</script>
  <script>
    const QUESTIONS = JSON.parse(document.getElementById('question-data').textContent);
    const STATE_KEY = 'mayuan-single-trainer-v1';
    const letters = ['A', 'B', 'C', 'D'];
    const stages = [
      { id: 'review', icon: '◇', label: '第一遍', hint: '看答案解析' },
      { id: 'self', icon: '◐', label: '第二遍', hint: '遮答案自测' },
      { id: 'exam', icon: '◆', label: '第三遍', hint: '正式练习' }
    ];
    const modes = [
      { id: 'sequence', icon: '↧', label: '顺序' },
      { id: 'random', icon: '⤨', label: '随机' },
      { id: 'wrong', icon: '!', label: '只看错题' },
      { id: 'starred', icon: '★', label: '只看收藏' }
    ];
    const chapters = [...new Set(QUESTIONS.map(question => question.chapter))];
    let live = { id: null, selected: null, revealed: false, peeked: false };
    let state = loadState();

    function freshState() {
      return { stage: 'review', chapter: 'ALL', mode: 'sequence', currentId: QUESTIONS[0].id, search: '', progress: {} };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        if (!raw) return freshState();
        const parsed = JSON.parse(raw);
        return { ...freshState(), ...parsed, progress: parsed.progress || {} };
      } catch (_error) {
        return freshState();
      }
    }

    function saveState() {
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function progressFor(id) {
      if (!state.progress[id]) {
        state.progress[id] = {
          reviewed: false,
          attempts: 0,
          correct: 0,
          wrong: 0,
          selfAttempts: 0,
          examAttempts: 0,
          streak: 0,
          wrongActive: false,
          starred: false,
          lastAnswer: '',
          lastCorrect: null,
          peeks: 0
        };
      }
      return state.progress[id];
    }

    function getQuestion(id) {
      return QUESTIONS.find(question => question.id === id) || QUESTIONS[0];
    }

    function qMatchesSearch(question) {
      const needle = (state.search || '').trim().toLowerCase();
      if (!needle) return true;
      const haystack = [
        question.chapter,
        question.number,
        question.stem,
        question.answer,
        question.answerText,
        question.explanation,
        ...question.keywords,
        ...Object.values(question.options)
      ].join(' ').toLowerCase();
      return haystack.includes(needle);
    }

    function basePool() {
      return QUESTIONS.filter(question => (state.chapter === 'ALL' || question.chapter === state.chapter) && qMatchesSearch(question));
    }

    function currentPool() {
      let pool = basePool();
      if (state.mode === 'wrong') pool = pool.filter(question => progressFor(question.id).wrongActive);
      if (state.mode === 'starred') pool = pool.filter(question => progressFor(question.id).starred);
      return pool;
    }

    function ensureCurrent() {
      const pool = currentPool();
      if (!pool.length) return null;
      if (!pool.some(question => question.id === state.currentId)) {
        state.currentId = state.mode === 'random' ? pool[Math.floor(Math.random() * pool.length)].id : pool[0].id;
        saveState();
      }
      return getQuestion(state.currentId);
    }

    function setLive(id, reset = true) {
      if (reset || live.id !== id) live = { id, selected: null, revealed: false, peeked: false };
    }

    function renderAll(resetLive = true) {
      renderControls();
      const question = ensureCurrent();
      if (question) {
        setLive(question.id, resetLive);
        const progress = progressFor(question.id);
        if (state.stage === 'review' && !progress.reviewed) {
          progress.reviewed = true;
          saveState();
        }
      }
      renderStats();
      renderChapterProgress();
      renderQuestion(question);
    }

    function renderControls() {
      const stageTabs = document.getElementById('stageTabs');
      stageTabs.innerHTML = stages.map(stage => `
        <button class="stage-tab ${state.stage === stage.id ? 'active' : ''}" data-stage="${stage.id}">
          <span class="kbd">${stage.icon}</span><span class="meta"><strong>${stage.label}</strong><small>${stage.hint}</small></span>
        </button>`).join('');
      stageTabs.querySelectorAll('button').forEach(button => button.addEventListener('click', () => {
        state.stage = button.dataset.stage;
        if (state.stage === 'exam' && state.mode === 'sequence') state.mode = 'random';
        saveState();
        renderAll(true);
      }));

      const modeTabs = document.getElementById('modeTabs');
      modeTabs.innerHTML = modes.map(mode => `
        <button class="mode-tab ${state.mode === mode.id ? 'active' : ''}" data-mode="${mode.id}">
          <span class="kbd">${mode.icon}</span><strong>${mode.label}</strong>
        </button>`).join('');
      modeTabs.querySelectorAll('button').forEach(button => button.addEventListener('click', () => {
        state.mode = button.dataset.mode;
        saveState();
        renderAll(true);
      }));

      const chapterSelect = document.getElementById('chapterSelect');
      chapterSelect.innerHTML = '<option value="ALL">全部章节</option>' + chapters.map(chapter => `<option value="${escapeHtml(chapter)}">${escapeHtml(chapter)}</option>`).join('');
      chapterSelect.value = state.chapter;
      chapterSelect.onchange = () => {
        state.chapter = chapterSelect.value;
        saveState();
        renderAll(true);
      };

      const searchBox = document.getElementById('searchBox');
      if (searchBox.value !== state.search) searchBox.value = state.search || '';
      searchBox.oninput = () => {
        state.search = searchBox.value;
        saveState();
        renderAll(true);
      };
    }

    function renderStats() {
      const totalAttempts = QUESTIONS.reduce((sum, question) => sum + progressFor(question.id).attempts, 0);
      const totalCorrect = QUESTIONS.reduce((sum, question) => sum + progressFor(question.id).correct, 0);
      const wrongActive = QUESTIONS.filter(question => progressFor(question.id).wrongActive).length;
      const pool = currentPool();
      const done = stageDoneCount(basePool());
      const totalForStage = basePool().length || 1;
      const accuracy = totalAttempts ? `${Math.round(totalCorrect / totalAttempts * 100)}%` : '0%';
      const items = [
        ['题库', QUESTIONS.length],
        ['当前题池', pool.length],
        ['正确率', accuracy],
        ['待复刷错题', wrongActive],
        ['本阶段进度', `${done}/${totalForStage}`]
      ];
      document.getElementById('stats').innerHTML = items.map(([label, value]) => `<div class="stat"><span>${label}</span><strong>${value}</strong></div>`).join('');
    }

    function stageDoneCount(pool) {
      return pool.filter(question => {
        const progress = progressFor(question.id);
        if (state.stage === 'review') return progress.reviewed;
        if (state.stage === 'self') return progress.selfAttempts > 0;
        return progress.examAttempts > 0;
      }).length;
    }

    function renderChapterProgress() {
      const box = document.getElementById('chapterProgress');
      box.innerHTML = chapters.map(chapter => {
        const list = QUESTIONS.filter(question => question.chapter === chapter);
        const done = stageDoneCount(list);
        const pct = Math.round(done / list.length * 100);
        const wrong = list.filter(question => progressFor(question.id).wrongActive).length;
        return `<div class="chapter-row">
          <div class="chapter-line"><strong>${escapeHtml(chapter)}</strong><span>${done}/${list.length} · 错误${wrong}</span></div>
          <div class="bar"><i style="width:${pct}%"></i></div>
        </div>`;
      }).join('');
    }

    function renderQuestion(question) {
      const panel = document.getElementById('questionPanel');
      if (!question) {
        panel.innerHTML = '<div class="empty">当前条件下没有题目</div>';
        return;
      }
      const progress = progressFor(question.id);
      const pool = currentPool();
      const index = Math.max(0, pool.findIndex(item => item.id === question.id));
      const revealed = state.stage === 'review' || live.revealed;
      const feedbackClass = !revealed ? '' : (live.selected ? (live.selected === question.answer ? 'good' : 'bad') : 'good');
      const feedbackTitle = !revealed ? '' : (live.selected ? (live.selected === question.answer ? '答对了' : '这题要复刷') : `正确答案 ${question.answer}`);
      panel.innerHTML = `
        <div class="question-head">
          <div class="q-meta">
            <span class="pill">${escapeHtml(question.chapter)}</span>
            <span class="pill">原题号 ${question.number}</span>
            <span class="pill">${index + 1}/${pool.length}</span>
          </div>
          <button class="icon-btn" id="starBtn"><span>${progress.starred ? '★' : '☆'}</span><span>${progress.starred ? '已收藏' : '收藏'}</span></button>
        </div>
        <div class="question-body">
          <p class="stem">${escapeHtml(question.stem)}</p>
          <div class="options">${letters.map(letter => optionMarkup(question, letter, revealed)).join('')}</div>
          <div class="feedback ${revealed ? 'show' : ''} ${feedbackClass}">
            <h2>${feedbackTitle}</h2>
            <p><strong>答案：</strong><span class="kbd">${question.answer}</span>. ${escapeHtml(question.answerText)}</p>
            <p><strong>解析：</strong>${escapeHtml(question.explanation)}</p>
            <div class="keywords">${question.keywords.map(keyword => `<span class="keyword">${escapeHtml(keyword)}</span>`).join('')}</div>
            <p>已答${progress.attempts}次 · 错误${progress.wrong}次 · 连对${progress.streak}次</p>
          </div>
          <div class="actions">
            <div class="nav-group">
              <button class="nav-btn" id="prevBtn"><span>←</span><span>上一题</span></button>
              <button class="nav-btn" id="nextBtn"><span>→</span><span>下一题</span></button>
              <button class="nav-btn" id="randomBtn"><span>⤨</span><span>随机一题</span></button>
            </div>
            <div class="nav-group">
              ${state.stage !== 'review' && !revealed ? '<button class="nav-btn warn" id="revealBtn"><span>◎</span><span>查看答案</span></button>' : ''}
              ${state.stage === 'review' ? '<button class="nav-btn primary" id="completeBtn"><span>✓</span><span>已看懂，下一题</span></button>' : ''}
            </div>
          </div>
        </div>`;
      panel.querySelectorAll('.option').forEach(button => button.addEventListener('click', () => chooseAnswer(question, button.dataset.letter)));
      document.getElementById('starBtn').onclick = () => {
        progress.starred = !progress.starred;
        saveState();
        renderAll(false);
      };
      document.getElementById('prevBtn').onclick = () => move(-1);
      document.getElementById('nextBtn').onclick = () => move(1);
      document.getElementById('randomBtn').onclick = randomQuestion;
      const revealBtn = document.getElementById('revealBtn');
      if (revealBtn) revealBtn.onclick = () => {
        live.revealed = true;
        live.peeked = true;
        progress.peeks += 1;
        saveState();
        renderAll(false);
      };
      const completeBtn = document.getElementById('completeBtn');
      if (completeBtn) completeBtn.onclick = () => move(1);
      saveState();
    }

    function optionMarkup(question, letter, revealed) {
      const selected = live.selected === letter;
      const isCorrect = question.answer === letter;
      let cls = '';
      let mark = '';
      if (revealed && isCorrect) { cls = 'correct'; mark = '✓'; }
      if (revealed && selected && !isCorrect) { cls = 'wrong'; mark = '×'; }
      return `<button class="option ${cls}" data-letter="${letter}" ${state.stage === 'review' ? 'disabled' : ''}>
        <span class="letter">${letter}</span><span class="text">${escapeHtml(question.options[letter])}</span><span class="mark">${mark}</span>
      </button>`;
    }

    function chooseAnswer(question, letter) {
      if (state.stage === 'review') return;
      if (live.revealed && live.selected) return;
      const progress = progressFor(question.id);
      const correct = letter === question.answer;
      live = { id: question.id, selected: letter, revealed: true, peeked: false };
      progress.attempts += 1;
      if (state.stage === 'self') progress.selfAttempts += 1;
      if (state.stage === 'exam') progress.examAttempts += 1;
      progress.lastAnswer = letter;
      progress.lastCorrect = correct;
      if (correct) {
        progress.correct += 1;
        progress.streak += 1;
        if (progress.streak >= 2) progress.wrongActive = false;
      } else {
        progress.wrong += 1;
        progress.streak = 0;
        progress.wrongActive = true;
      }
      saveState();
      renderAll(false);
    }

    function move(delta) {
      const pool = currentPool();
      if (!pool.length) return;
      let index = pool.findIndex(question => question.id === state.currentId);
      if (index < 0) index = 0;
      index = (index + delta + pool.length) % pool.length;
      state.currentId = pool[index].id;
      saveState();
      live = { id: state.currentId, selected: null, revealed: false, peeked: false };
      renderAll(true);
    }

    function randomQuestion() {
      const pool = currentPool();
      if (!pool.length) return;
      let pick = pool[Math.floor(Math.random() * pool.length)];
      if (pool.length > 1) {
        while (pick.id === state.currentId) pick = pool[Math.floor(Math.random() * pool.length)];
      }
      state.currentId = pick.id;
      saveState();
      live = { id: state.currentId, selected: null, revealed: false, peeked: false };
      renderAll(true);
    }

    function exportWrongCsv() {
      const rows = QUESTIONS.filter(question => progressFor(question.id).wrongActive || progressFor(question.id).wrong > 0);
      if (!rows.length) {
        alert('目前没有错题可导出。');
        return;
      }
      const header = ['章节', '原题号', '题干', '正确答案', '正确选项', '最近选择', '错误次数', '连续答对', '关键词'];
      const body = rows.map(question => {
        const progress = progressFor(question.id);
        return [question.chapter, question.number, question.stem, question.answer, question.answerText, progress.lastAnswer || '', progress.wrong, progress.streak, question.keywords.join(' / ')];
      });
      const csv = '\ufeff' + [header, ...body].map(row => row.map(csvCell).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = '马原单选错题.csv';
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      const text = String(value ?? '');
      return '"' + text.replace(/"/g, '""') + '"';
    }

    function resetProgress() {
      if (!confirm('确定要清空所有进度和错题记录吗？')) return;
      localStorage.removeItem(STATE_KEY);
      state = freshState();
      live = { id: null, selected: null, revealed: false, peeked: false };
      renderAll(true);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
    }

    function validateData() {
      const counts = QUESTIONS.reduce((acc, question) => {
        acc[question.chapter] = (acc[question.chapter] || 0) + 1;
        return acc;
      }, {});
      const optionOk = QUESTIONS.every(question => letters.every(letter => question.options[letter]) && letters.includes(question.answer) && question.explanation);
      console.info('题库校验', QUESTIONS.length, counts, optionOk);
    }

    document.getElementById('exportWrong').onclick = exportWrongCsv;
    document.getElementById('resetProgress').onclick = resetProgress;
    validateData();
    renderAll(true);
  </script>
</body>
</html>
