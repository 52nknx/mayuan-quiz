<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>马原单选刷题</title>
  <style>
    :root {
      --ink: #22231f;
      --muted: #676e65;
      --paper: #fbfcf7;
      --panel: #ffffff;
      --panel-2: #f4f7f0;
      --line: #d8dfd1;
      --jade: #1f7a5a;
      --jade-soft: #dceee7;
      --cinnabar: #be4935;
      --cinnabar-soft: #f7ded8;
      --blue: #315f8a;
      --gold: #b98222;
      --shadow: 0 18px 48px rgba(35, 39, 31, .12);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "LXGW WenKai", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background:
        linear-gradient(135deg, rgba(31, 122, 90, .10), transparent 28%),
        linear-gradient(45deg, transparent 0 48%, rgba(190, 73, 53, .09) 48% 52%, transparent 52%),
        repeating-linear-gradient(0deg, rgba(34,35,31,.035) 0 1px, transparent 1px 31px),
        #eef3ec;
      letter-spacing: 0;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(31,122,90,.08) 0 1px, transparent 1px 78px),
        linear-gradient(0deg, rgba(190,73,53,.06) 0 1px, transparent 1px 78px);
      mask-image: linear-gradient(180deg, rgba(0,0,0,.6), transparent 72%);
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid rgba(49,95,138,.24);
      outline-offset: 2px;
    }
    .app { max-width: 1440px; margin: 0 auto; padding: 18px; }
    .topbar {
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 16px;
      padding: 18px 20px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }
    .topbar::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cinnabar), var(--gold), var(--jade), var(--blue));
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .seal {
      width: 54px; height: 54px; flex: 0 0 54px;
      display: grid; place-items: center;
      color: white; background: var(--cinnabar);
      border: 3px double rgba(255,255,255,.72);
      border-radius: 50%; font-weight: 800; font-size: 22px;
      box-shadow: 0 8px 18px rgba(190,73,53,.24);
    }
    .eyebrow { margin: 0 0 4px; color: var(--jade); font-size: 13px; font-weight: 800; }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 48px); line-height: 1.03; letter-spacing: 0; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 15px; }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .icon-btn, .option, .stage-tab, .mode-tab, .nav-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: var(--radius);
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .icon-btn { min-height: 40px; padding: 0 12px; display: inline-flex; align-items: center; gap: 7px; }
    .icon-btn:hover, .nav-btn:hover, .option:hover { transform: translateY(-1px); border-color: var(--jade); box-shadow: 0 8px 20px rgba(31,122,90,.11); }
    .module-tabs {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(104px, 1fr));
      gap: 6px;
      padding: 5px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .module-tab {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: calc(var(--radius) - 2px);
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }
    .module-tab.active {
      background: var(--panel);
      color: var(--jade);
      border-color: rgba(31,122,90,.28);
      box-shadow: 0 6px 16px rgba(31,122,90,.10);
    }
    .shell { display: grid; grid-template-columns: 292px minmax(0, 1fr); gap: 18px; margin-top: 18px; align-items: start; }
    .side { display: grid; gap: 14px; position: sticky; top: 14px; }
    .panel, .question-panel, .stat {
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(35,39,31,.08);
    }
    .panel { padding: 14px; backdrop-filter: blur(8px); }
    .control-title { margin: 0 0 9px; font-size: 13px; color: var(--muted); font-weight: 800; }
    .segmented { display: grid; gap: 8px; }
    .stage-tab, .mode-tab {
      width: 100%; min-height: 48px; padding: 9px 10px;
      display: flex; align-items: center; justify-content: flex-start; gap: 10px;
      text-align: left;
    }
    .stage-tab .meta { display: grid; gap: 1px; }
    .stage-tab strong, .mode-tab strong { font-size: 15px; }
    .stage-tab small { color: var(--muted); font-size: 12px; }
    .stage-tab.active, .mode-tab.active { background: var(--jade-soft); border-color: var(--jade); color: #123f31; }
    .field { display: grid; gap: 8px; margin-top: 14px; }
    .field label { color: var(--muted); font-size: 13px; font-weight: 800; }
    select, input[type="search"] {
      width: 100%; min-height: 42px; border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--panel); color: var(--ink); padding: 0 11px; outline: none;
    }
    select:focus, input[type="search"]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(49,95,138,.12); }
    .study { display: grid; gap: 14px; min-width: 0; }
    .exam-banner {
      display: none;
      border-left: 4px solid var(--cinnabar);
      background:
        linear-gradient(90deg, rgba(190,73,53,.08), transparent 64%),
        rgba(255,255,255,.94);
      padding: 13px 15px;
    }
    .exam-banner.show { display: grid; gap: 4px; }
    .exam-banner h2 { margin: 0; font-size: 18px; }
    .exam-banner p { margin: 0; color: var(--muted); line-height: 1.6; }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 10px; }
    .stat {
      position: relative;
      overflow: hidden;
      min-height: 84px;
      padding: 13px;
      display: grid;
      align-content: space-between;
    }
    .stat::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--jade), transparent);
    }
    .stat span { color: var(--muted); font-size: 12px; font-weight: 800; }
    .stat strong { font-size: 24px; line-height: 1; }
    .question-panel {
      overflow: hidden;
      border-top: 4px solid var(--jade);
      animation: liftIn .22s ease-out both;
    }
    .question-head {
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      padding: 15px 18px; border-bottom: 1px solid var(--line); background: linear-gradient(90deg, #ffffff, #f6faf5);
    }
    .q-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; font-weight: 800; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px; min-height: 28px; padding: 0 9px;
      border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
      white-space: nowrap;
    }
    .question-body { padding: 20px 18px 18px; display: grid; gap: 16px; }
    .stem { font-size: clamp(18px, 2.2vw, 25px); line-height: 1.65; margin: 0; font-weight: 800; }
    .options { display: grid; gap: 10px; }
    .option {
      width: 100%; min-height: 58px; padding: 12px 14px; display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 28px; gap: 10px; align-items: center;
      text-align: left; background: var(--panel);
    }
    .option:not(:disabled):active { transform: translateY(0); box-shadow: none; }
    .option:disabled { cursor: default; opacity: 1; }
    .option .letter {
      width: 34px; height: 34px; display: grid; place-items: center;
      border: 1px solid var(--line); border-radius: 50%; font-weight: 900; color: var(--blue); background: #f8fbff;
    }
    .option .text { line-height: 1.45; overflow-wrap: anywhere; }
    .option .mark { text-align: center; font-weight: 900; }
    .option.correct { border-color: var(--jade); background: #edf8f2; }
    .option.correct .letter { background: var(--jade); color: white; border-color: var(--jade); }
    .option.wrong { border-color: var(--cinnabar); background: var(--cinnabar-soft); }
    .option.wrong .letter { background: var(--cinnabar); color: white; border-color: var(--cinnabar); }
    .feedback {
      position: relative;
      display: none; border: 1px solid var(--line); border-radius: var(--radius); padding: 14px;
      background: #fffdf8;
    }
    .feedback::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 12px;
      bottom: 12px;
      width: 4px;
      border-radius: 999px;
      background: var(--gold);
    }
    .feedback.show { display: grid; gap: 10px; }
    .feedback.good { border-color: rgba(31,122,90,.45); background: #eef8f2; }
    .feedback.bad { border-color: rgba(190,73,53,.45); background: #fff0ed; }
    .feedback h2 { margin: 0; font-size: 18px; }
    .feedback p { margin: 0; line-height: 1.7; }
    .analysis-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
    .source-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      border: 1px dashed rgba(49,95,138,.28);
      border-radius: var(--radius);
      background: rgba(247,251,255,.78);
      padding: 8px 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .source-line span {
      flex: 0 0 auto;
      border-radius: 999px;
      background: #eef5fb;
      color: var(--blue);
      font-weight: 900;
      padding: 3px 8px;
    }
    .source-line p { margin: 0; }
    .detail-toggle {
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(31,122,90,.35);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--jade);
      font-weight: 800;
    }
    .detail-toggle:hover { border-color: var(--jade); box-shadow: 0 6px 16px rgba(31,122,90,.10); }
    .analysis-detail {
      display: none;
      gap: 10px;
      padding-top: 2px;
    }
    .analysis-detail.show { display: grid; }
    .analysis-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .analysis-block {
      border: 1px solid rgba(216,223,209,.95);
      border-radius: var(--radius);
      background: rgba(255,255,255,.72);
      padding: 11px 12px;
    }
    .analysis-block.full { grid-column: 1 / -1; }
    .analysis-block h3 {
      margin: 0 0 6px;
      font-size: 14px;
      color: var(--jade);
    }
    .analysis-block p { font-size: 15px; }
    .option-analysis { display: grid; gap: 7px; }
    .option-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      font-size: 15px;
      line-height: 1.6;
    }
    .option-row b {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f7f9f4;
      color: var(--blue);
      border: 1px solid var(--line);
    }
    .option-row.correct b { background: var(--jade); color: white; border-color: var(--jade); }
    .keywords { display: flex; flex-wrap: wrap; gap: 8px; }
    .keyword { border: 1px solid var(--line); background: #f7f9f4; border-radius: 999px; padding: 5px 9px; font-size: 13px; }
    .q-tools { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .icon-btn.note-active { border-color: rgba(185,130,34,.55); background: #fff7e8; color: #6c4a0a; }
    .note-panel {
      display: grid;
      gap: 10px;
      border: 1px solid rgba(185,130,34,.34);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fffaf0, #ffffff);
      padding: 13px;
    }
    .note-head, .note-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .note-title { margin: 0; font-weight: 900; color: #6c4a0a; }
    .note-status, .note-help { color: var(--muted); font-size: 12px; font-weight: 800; }
    .note-tabs {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(58px, 1fr));
      gap: 5px;
      padding: 4px;
      border: 1px solid rgba(185,130,34,.25);
      border-radius: var(--radius);
      background: rgba(255,255,255,.74);
    }
    .note-tab {
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: calc(var(--radius) - 2px);
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }
    .note-tab.active { background: #fff3d6; border-color: rgba(185,130,34,.48); color: #6c4a0a; }
    .note-editor.hide { display: none; }
    .note-box {
      width: 100%;
      min-height: 124px;
      resize: vertical;
      border: 1px solid rgba(185,130,34,.30);
      border-radius: var(--radius);
      padding: 11px 12px;
      line-height: 1.65;
      color: var(--ink);
      background: rgba(255,255,255,.88);
      outline: none;
    }
    .note-box:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(185,130,34,.14); }
    .note-preview {
      display: none;
      min-height: 92px;
      border: 1px dashed rgba(185,130,34,.36);
      border-radius: var(--radius);
      padding: 12px 13px;
      line-height: 1.72;
      background: rgba(255,255,255,.72);
      overflow-wrap: anywhere;
    }
    .note-preview.show { display: block; }
    .note-preview.empty { color: var(--muted); font-weight: 800; }
    .note-preview h1, .note-preview h2, .note-preview h3 { margin: .2em 0 .45em; line-height: 1.35; color: #6c4a0a; }
    .note-preview h1 { font-size: 20px; }
    .note-preview h2 { font-size: 18px; }
    .note-preview h3 { font-size: 16px; }
    .note-preview p { margin: .3em 0; }
    .note-preview ul { margin: .35em 0 .35em 1.3em; padding: 0; }
    .note-preview li { margin: .18em 0; }
    .note-preview blockquote {
      margin: .45em 0;
      padding: 6px 10px;
      border-left: 3px solid var(--gold);
      background: #fff7e8;
      color: #5f4a24;
    }
    .note-preview code {
      padding: 1px 5px;
      border-radius: 5px;
      background: #f1efe7;
      color: #8a3f2c;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: .92em;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
    .nav-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .nav-btn { min-height: 42px; padding: 0 13px; display: inline-flex; align-items: center; gap: 7px; background: var(--panel); }
    .nav-btn.primary { background: var(--ink); color: white; border-color: var(--ink); }
    .nav-btn.primary:hover { background: var(--jade); border-color: var(--jade); }
    .nav-btn.warn { color: var(--cinnabar); }
    .chapter-list { display: grid; gap: 10px; }
    .chapter-row { display: grid; gap: 5px; }
    .chapter-line { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; }
    .bar { height: 8px; background: #e8ede3; border-radius: 999px; overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--jade), var(--gold)); }
    .empty { padding: 30px; text-align: center; color: var(--muted); }
    .kbd { font-weight: 900; color: var(--blue); }
    @keyframes liftIn {
      from { opacity: .72; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .study { order: 1; }
      .side { order: 2; }
      .side { position: static; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .app { padding: 10px; }
      .topbar, .question-head { flex-direction: column; align-items: stretch; }
      .top-actions { justify-content: stretch; }
      .top-actions .icon-btn, .module-tabs { flex: 1; justify-content: center; }
      .side { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stat { min-height: 68px; padding: 11px; }
      .stat strong { font-size: 22px; }
      .stat:last-child { grid-column: 1 / -1; }
      .analysis-grid { grid-template-columns: 1fr; }
      .analysis-block.full { grid-column: auto; }
      .option { grid-template-columns: 32px minmax(0, 1fr) 22px; }
      .q-tools { justify-content: stretch; }
      .q-tools .icon-btn { flex: 1; justify-content: center; }
      .stem { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="seal">马</div>
        <div>
          <p class="eyebrow">马克思主义基本原理</p>
          <h1>马原单选刷题</h1>
          <p class="subtitle">202道单选 · 三遍复习 · 本地自动保存</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="module-tabs" id="moduleTabs" aria-label="模块切换"></div>
        <button class="icon-btn" id="exportNotes" title="导出有笔记题为Markdown"><span>▣</span><span>导出笔记</span></button>
        <button class="icon-btn" id="exportWrong" title="导出错题CSV"><span>⇩</span><span>导出错题</span></button>
        <button class="icon-btn" id="resetProgress" title="重置进度"><span>↺</span><span>重置</span></button>
      </div>
    </header>

    <main class="shell">
      <aside class="side">
        <section class="panel">
          <p class="control-title">学习阶段</p>
          <div class="segmented" id="stageTabs"></div>
          <div class="field">
            <label for="chapterSelect">章节</label>
            <select id="chapterSelect"></select>
          </div>
          <div class="field">
            <label for="searchBox">搜索</label>
            <input id="searchBox" type="search" placeholder="搜题干、选项、关键词或笔记" autocomplete="off">
          </div>
        </section>
        <section class="panel">
          <p class="control-title">刷题模式</p>
          <div class="segmented" id="modeTabs"></div>
        </section>
        <section class="panel">
          <p class="control-title">本阶段进度</p>
          <div class="chapter-list" id="chapterProgress"></div>
        </section>
      </aside>

      <section class="study">
        <section class="panel exam-banner" id="examBanner">
          <h2>2025-2026 学年第一学期期末考试 A 卷</h2>
          <p>真题在线 · 单选 30 题 · 官方答案校验 · 独立错题复刷</p>
        </section>
        <div class="stats" id="stats"></div>
        <article class="question-panel" id="questionPanel"></article>
      </section>
    </main>
  </div>

  <script>
    const QUESTIONS = JSON.parse(document.getElementById('question-data').textContent);
    const REAL_EXAM_QUESTIONS = JSON.parse(document.getElementById('real-exam-data').textContent);
    const MODULES = {
      review: {
        id: 'review',
        label: '题库练习',
        subtitle: '202道单选 · 三遍复习 · 本地自动保存',
        stateKey: 'mayuan-single-trainer-v1',
        questions: QUESTIONS,
        hasChapters: true,
        titleLabel: '题库'
      },
      realExam: {
        id: 'realExam',
        label: '真题在线',
        subtitle: '多套真题 · 按卷练习 · 独立错题复刷',
        stateKey: 'mayuan-real-exam-v1',
        questions: REAL_EXAM_QUESTIONS,
        hasChapters: false,
        titleLabel: '真题'
      }
    };
    const ALL_REAL_EXAMS = 'ALL_REAL_EXAMS';
    const REAL_EXAM_PAPERS = Array.from(
      REAL_EXAM_QUESTIONS.reduce((map, question) => {
        if (!map.has(question.paperId)) {
          map.set(question.paperId, {
            paperId: question.paperId,
            title: question.paperTitle || question.paper,
            term: question.term,
            answerSource: question.answerSource,
            answerSourceNote: question.answerSourceNote
          });
        }
        return map;
      }, new Map()).values()
    );
    const APP_KEY = 'mayuan-active-module-v1';
    const letters = ['A', 'B', 'C', 'D'];
    const stages = [
      { id: 'review', icon: '◇', label: '第一遍', hint: '看答案解析' },
      { id: 'self', icon: '◐', label: '第二遍', hint: '遮答案自测' },
      { id: 'exam', icon: '◆', label: '第三遍', hint: '正式练习' }
    ];
    const modes = [
      { id: 'sequence', icon: '↧', label: '顺序' },
      { id: 'random', icon: '⤨', label: '随机' },
      { id: 'wrong', icon: '!', label: '只看错题' },
      { id: 'starred', icon: '★', label: '只看收藏' },
      { id: 'noted', icon: '✎', label: '只看笔记' }
    ];
    let activeModule = localStorage.getItem(APP_KEY);
    if (!MODULES[activeModule]) activeModule = 'review';
    let state = loadState();
    let live = freshLive();

    function activeConfig() {
      return MODULES[activeModule];
    }

    function activeQuestions() {
      return activeConfig().questions;
    }

    function activeStateKey() {
      return activeConfig().stateKey;
    }

    function chaptersForActive() {
      return [...new Set(activeQuestions().map(question => question.chapter))];
    }

    function defaultPaperId() {
      return REAL_EXAM_PAPERS[0]?.paperId || ALL_REAL_EXAMS;
    }

    function selectedPaper() {
      const paperId = state?.paperId || defaultPaperId();
      return REAL_EXAM_PAPERS.find(paper => paper.paperId === paperId) || REAL_EXAM_PAPERS[0] || null;
    }

    function paperScopeQuestions(includeSearch = false) {
      let list = activeQuestions();
      if (activeModule === 'realExam') {
        const paperId = state.paperId || defaultPaperId();
        if (paperId !== ALL_REAL_EXAMS) {
          list = list.filter(question => question.paperId === paperId);
        }
      }
      return includeSearch ? list.filter(qMatchesSearch) : list;
    }

    function freshState() {
      const first = activeQuestions()[0];
      return { stage: 'review', chapter: 'ALL', paperId: activeModule === 'realExam' ? defaultPaperId() : 'ALL', mode: 'sequence', currentId: first ? first.id : '', search: '', progress: {} };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(activeStateKey());
        if (!raw) return freshState();
        const parsed = JSON.parse(raw);
        const merged = { ...freshState(), ...parsed, progress: parsed.progress || {} };
        if (activeModule === 'realExam' && (!merged.paperId || (!REAL_EXAM_PAPERS.some(paper => paper.paperId === merged.paperId) && merged.paperId !== ALL_REAL_EXAMS))) {
          merged.paperId = defaultPaperId();
        }
        return merged;
      } catch (_error) {
        return freshState();
      }
    }

    function saveState() {
      localStorage.setItem(activeStateKey(), JSON.stringify(state));
    }

    function freshLive(id = null) {
      return { id, selected: null, revealed: false, peeked: false, detailOpen: false, noteOpen: false, noteMode: 'edit' };
    }

    function progressFor(id) {
      if (!state.progress[id]) {
        state.progress[id] = {
          reviewed: false,
          attempts: 0,
          correct: 0,
          wrong: 0,
          selfAttempts: 0,
          examAttempts: 0,
          streak: 0,
          wrongActive: false,
          starred: false,
          lastAnswer: '',
          lastCorrect: null,
          peeks: 0,
          note: '',
          noteUpdatedAt: ''
        };
      }
      const progress = state.progress[id];
      if (typeof progress.note !== 'string') progress.note = '';
      if (typeof progress.noteUpdatedAt !== 'string') progress.noteUpdatedAt = '';
      return progress;
    }

    function hasNote(id) {
      return progressFor(id).note.trim().length > 0;
    }

    function noteCount(questions) {
      return questions.filter(question => hasNote(question.id)).length;
    }

    function getQuestion(id) {
      return activeQuestions().find(question => question.id === id) || paperScopeQuestions(false)[0] || activeQuestions()[0];
    }

    function qMatchesSearch(question) {
      const needle = (state.search || '').trim().toLowerCase();
      if (!needle) return true;
      const haystack = [
        question.chapter,
        question.number,
        question.stem,
        question.answer,
        question.answerText,
        question.explanation,
        question.briefExplanation,
        question.keyPoint,
        question.whyCorrect,
        question.memoryCue,
        question.pitfall,
        progressFor(question.id).note,
        ...Object.values(question.optionAnalysis || {}),
        ...question.keywords,
        ...Object.values(question.options)
      ].join(' ').toLowerCase();
      return haystack.includes(needle);
    }

    function basePool() {
      if (activeModule === 'realExam') {
        return paperScopeQuestions(true);
      }
      return activeQuestions().filter(question => (state.chapter === 'ALL' || question.chapter === state.chapter) && qMatchesSearch(question));
    }

    function currentPool() {
      let pool = basePool();
      if (state.mode === 'wrong') pool = pool.filter(question => progressFor(question.id).wrongActive);
      if (state.mode === 'starred') pool = pool.filter(question => progressFor(question.id).starred);
      if (state.mode === 'noted') pool = pool.filter(question => hasNote(question.id));
      return pool;
    }

    function ensureCurrent() {
      const pool = currentPool();
      if (!pool.length) return null;
      if (!pool.some(question => question.id === state.currentId)) {
        state.currentId = state.mode === 'random' ? pool[Math.floor(Math.random() * pool.length)].id : pool[0].id;
        saveState();
      }
      return getQuestion(state.currentId);
    }

    function setLive(id, reset = true) {
      if (reset || live.id !== id) live = freshLive(id);
    }

    function renderAll(resetLive = true) {
      renderControls();
      const question = ensureCurrent();
      if (question) {
        setLive(question.id, resetLive);
        const progress = progressFor(question.id);
        if (state.stage === 'review' && !progress.reviewed) {
          progress.reviewed = true;
          saveState();
        }
      }
      renderStats();
      renderChapterProgress();
      renderQuestion(question);
    }

    function renderControls() {
      document.querySelector('.subtitle').textContent = activeConfig().subtitle;
      const moduleTabs = document.getElementById('moduleTabs');
      moduleTabs.innerHTML = Object.values(MODULES).map(module => `
        <button class="module-tab ${activeModule === module.id ? 'active' : ''}" data-module="${module.id}" type="button">${module.label}</button>
      `).join('');

        if (activeModule === button.dataset.module) return;

        live = freshLive();
        renderAll(true);
      }));
      document.getElementById('examBanner').classList.toggle('show', activeModule === 'realExam');
      if (activeModule === 'realExam') {

          : `<h2>${escapeHtml(paper?.title || '真题在线')}</h2><p>${escapeHtml(paper?.term || '')} · 单选 30 题 · 答案来源：${escapeHtml(paper?.answerSource || '')} · ${escapeHtml(paper?.answerSourceNote || '')}</p>`;

        <button class="stage-tab ${state.stage === stage.id ? 'active' : ''}" data-stage="${stage.id}">

        </button>`).join('');
      stageTabs.querySelectorAll('button').forEach(button => button.addEventListener('click', () => {
        state.stage = button.dataset.stage;

      }));

      const modeTabs = document.getElementById('modeTabs');
      modeTabs.innerHTML = modes.map(mode => `
        <button class="mode-tab ${state.mode === mode.id ? 'active' : ''}" data-mode="${mode.id}">
          <span class="kbd">${mode.icon}</span><strong>${mode.label}</strong>
        </button>`).join('');
      modeTabs.querySelectorAll('button').forEach(button => button.addEventListener('click', () => {
        state.mode = button.dataset.mode;
        saveState();
        renderAll(true);

      const chapterSelect = document.getElementById('chapterSelect');

          '<option value="ALL_REAL_EXAMS">全部真题随机</option>';
        chapterSelect.value = state.paperId;
      } else {
        const chapters = chaptersForActive();
        chapterSelect.disabled = false;
        selectLabel.textContent = '章节';

        chapterSelect.value = state.chapter;
      }
      chapterSelect.onchange = () => {

          if (state.paperId === ALL_REAL_EXAMS && state.mode === 'sequence') state.mode = 'random';

          state.chapter = chapterSelect.value;

    }

    function renderStats() {
      const questions = activeModule === 'realExam' ? paperScopeQuestions(false) : activeQuestions();
      const totalAttempts = questions.reduce((sum, question) => sum + progressFor(question.id).attempts, 0);
      const totalCorrect = questions.reduce((sum, question) => sum + progressFor(question.id).correct, 0);
      const wrongActive = questions.filter(question => progressFor(question.id).wrongActive).length;
      const pool = currentPool();
      const done = stageDoneCount(basePool());
      const totalForStage = basePool().length || 1;
      const accuracy = totalAttempts ? `${Math.round(totalCorrect / totalAttempts * 100)}%` : '0%';
      const items = [
        [activeConfig().titleLabel, questions.length],
        ['当前题池', pool.length],
        ['正确率', accuracy],
        ['待复刷错题', wrongActive],
        ['本阶段进度', `${done}/${totalForStage}`]
      ];
      document.getElementById('stats').innerHTML = items.map(([label, value]) => `<div class="stat"><span>${label}</span><strong>${value}</strong></div>`).join('');
    }

    function stageDoneCount(pool) {
      return pool.filter(question => {
        const progress = progressFor(question.id);
        if (state.stage === 'review') return progress.reviewed;
        if (state.stage === 'self') return progress.selfAttempts > 0;
        return progress.examAttempts > 0;
      }).length;
    }

    function renderChapterProgress() {
      const box = document.getElementById('chapterProgress');
      const questions = activeModule === 'realExam' ? paperScopeQuestions(false) : activeQuestions();
      const chapters = chaptersForActive();
      if (!activeConfig().hasChapters) {
        const papers = state.paperId === ALL_REAL_EXAMS ? REAL_EXAM_PAPERS : REAL_EXAM_PAPERS.filter(paper => paper.paperId === state.paperId);
        box.innerHTML = papers.map(paper => {
          const list = activeQuestions().filter(question => question.paperId === paper.paperId);
          const done = stageDoneCount(list);
          const pct = list.length ? Math.round(done / list.length * 100) : 0;
          const wrong = list.filter(question => progressFor(question.id).wrongActive).length;
          const attempted = list.filter(question => progressFor(question.id).attempts > 0).length;
          return `<div class="chapter-row">
            <div class="chapter-line"><strong>${escapeHtml(paper.term)}</strong><span>${done}/${list.length} · 已答${attempted} · 错误${wrong}</span></div>
            <div class="bar"><i style="width:${pct}%"></i></div>
          </div>`;
        }).join('');
        return;
      }
      box.innerHTML = chapters.map(chapter => {
        const list = questions.filter(question => question.chapter === chapter);
        const done = stageDoneCount(list);
        const pct = Math.round(done / list.length * 100);
        const wrong = list.filter(question => progressFor(question.id).wrongActive).length;
        return `<div class="chapter-row">
          <div class="chapter-line"><strong>${escapeHtml(chapter)}</strong><span>${done}/${list.length} · 错误${wrong}</span></div>
          <div class="bar"><i style="width:${pct}%"></i></div>
        </div>`;
      }).join('');
    }

    function renderQuestion(question) {
      const panel = document.getElementById('questionPanel');
      if (!question) {
        panel.innerHTML = '<div class="empty">当前条件下没有题目</div>';
        return;
      }
      const progress = progressFor(question.id);
      const pool = currentPool();
      const index = Math.max(0, pool.findIndex(item => item.id === question.id));
      const revealed = state.stage === 'review' || live.revealed;
      const feedbackClass = !revealed ? '' : (live.selected ? (live.selected === question.answer ? 'good' : 'bad') : 'good');
      const feedbackTitle = !revealed ? '' : (live.selected ? (live.selected === question.answer ? '答对了' : '这题要复刷') : `正确答案 ${question.answer}`);
      panel.innerHTML = `
        <div class="question-head">
          <div class="q-meta">
            <span class="pill">${escapeHtml(question.chapter)}</span>
            ${activeModule === 'realExam' ? `<span class="pill">${escapeHtml(question.term || question.paperTitle || '')}</span>` : ''}
            <span class="pill">${activeModule === 'realExam' ? '真题第' : '原题号 '}${question.number}${activeModule === 'realExam' ? '题' : ''}</span>
            <span class="pill">${index + 1}/${pool.length}</span>
          </div>
          <div class="q-tools">
            <button class="icon-btn" id="starBtn"><span>${progress.starred ? '★' : '☆'}</span><span>${progress.starred ? '已收藏' : '收藏'}</span></button>
            <button class="icon-btn ${hasNote(question.id) ? 'note-active' : ''}" id="noteBtn"><span>${hasNote(question.id) ? '✎' : '□'}</span><span>${hasNote(question.id) ? '有笔记' : '笔记'}</span></button>
          </div>
        </div>
        <div class="question-body">
          <p class="stem">${escapeHtml(question.stem)}</p>
          <div class="options">${letters.map(letter => optionMarkup(question, letter, revealed)).join('')}</div>
          <div class="feedback ${revealed ? 'show' : ''} ${feedbackClass}">
            <h2>${feedbackTitle}</h2>
            <p><strong>答案：</strong><span class="kbd">${question.answer}</span>. ${escapeHtml(question.answerText)}</p>
            ${analysisMarkup(question)}
            <div class="keywords">${question.keywords.map(keyword => `<span class="keyword">${escapeHtml(keyword)}</span>`).join('')}</div>
            <p>已答${progress.attempts}次 · 错误${progress.wrong}次 · 连对${progress.streak}次</p>
          </div>
          ${live.noteOpen ? noteMarkup(progress) : ''}
          <div class="actions">
            <div class="nav-group">
              <button class="nav-btn" id="prevBtn"><span>←</span><span>上一题</span></button>
              <button class="nav-btn" id="nextBtn"><span>→</span><span>下一题</span></button>
              <button class="nav-btn" id="randomBtn"><span>⤨</span><span>随机一题</span></button>
            </div>
            <div class="nav-group">
              ${state.stage !== 'review' && !revealed ? '<button class="nav-btn warn" id="revealBtn"><span>◎</span><span>查看答案</span></button>' : ''}
              ${state.stage === 'review' ? '<button class="nav-btn primary" id="completeBtn"><span>✓</span><span>已看懂，下一题</span></button>' : ''}
            </div>
          </div>
        </div>`;
      panel.querySelectorAll('.option').forEach(button => button.addEventListener('click', () => chooseAnswer(question, button.dataset.letter)));
      document.getElementById('starBtn').onclick = () => {
        progress.starred = !progress.starred;
        saveState();
        renderAll(false);
      };
      document.getElementById('noteBtn').onclick = () => {
        live.noteOpen = !live.noteOpen;
        renderAll(false);
      };
      const noteBox = document.getElementById('noteBox');
      if (noteBox) {
        noteBox.addEventListener('input', () => {
          progress.note = noteBox.value;
          progress.noteUpdatedAt = progress.note.trim() ? new Date().toISOString() : '';
          saveState();
          updateNoteUi(question.id, progress);
          renderStats();
          if (state.mode === 'noted' && !hasNote(question.id)) renderAll(true);
        });
      }
      document.querySelectorAll('.note-tab').forEach(button => button.addEventListener('click', () => {
        live.noteMode = button.dataset.noteMode || 'edit';
        renderAll(false);
      }));
      updateNotePreview(progress);
      document.getElementById('prevBtn').onclick = () => move(-1);
      document.getElementById('nextBtn').onclick = () => move(1);
      document.getElementById('randomBtn').onclick = randomQuestion;
      const revealBtn = document.getElementById('revealBtn');
      if (revealBtn) revealBtn.onclick = () => {
        live.revealed = true;
        live.peeked = true;
        progress.peeks += 1;
        saveState();
        renderAll(false);
      };
      const completeBtn = document.getElementById('completeBtn');
      if (completeBtn) completeBtn.onclick = () => move(1);
      const detailBtn = document.getElementById('detailToggle');
      if (detailBtn) detailBtn.onclick = () => {
        live.detailOpen = !live.detailOpen;
        renderAll(false);
      };
      saveState();
    }

    function noteMarkup(progress) {
      const previewMode = live.noteMode === 'preview';
      return `
        <section class="note-panel" aria-label="个人笔记">
          <div class="note-head">
            <p class="note-title">我的思路笔记</p>
            <span class="note-status" id="noteStatus">${noteStatusText(progress)}</span>
          </div>
          <div class="note-tools">
            <div class="note-tabs" aria-label="笔记模式">
              <button class="note-tab ${!previewMode ? 'active' : ''}" type="button" data-note-mode="edit">编辑</button>
              <button class="note-tab ${previewMode ? 'active' : ''}" type="button" data-note-mode="preview">预览</button>
            </div>
            <span class="note-help">支持 # 标题、- 列表、**重点**、\`代码\`</span>
          </div>
          <div class="note-editor ${previewMode ? 'hide' : ''}">
            <textarea class="note-box" id="noteBox" placeholder="用 Markdown 写下错因、题眼和记忆法。例：&#10;## 错因&#10;- 混淆了实践来源和实践动力&#10;**记忆：需要推动科学发展 = 动力**">${escapeHtml(progress.note)}</textarea>
          </div>
          <div class="note-preview ${previewMode ? 'show' : ''}" id="notePreview"></div>
        </section>`;
    }

    function noteStatusText(progress) {
      if (!progress.note.trim()) return '空白时不会计入笔记题';
      return progress.noteUpdatedAt ? `已保存 ${formatNoteTime(progress.noteUpdatedAt)}` : '已保存';
    }

    function updateNotePreview(progress) {
      const preview = document.getElementById('notePreview');
      if (!preview) return;
      const note = progress.note.trim();
      preview.classList.toggle('empty', !note);
      preview.innerHTML = note ? renderMarkdownNote(note) : '切换到编辑后写下 Markdown 笔记，预览会显示在这里。';
    }

    function updateNoteUi(id, progress) {
      const noteStatus = document.getElementById('noteStatus');
      const noteBtn = document.getElementById('noteBtn');
      const noted = hasNote(id);
      if (noteStatus) noteStatus.textContent = noteStatusText(progress);
      if (noteBtn) {
        noteBtn.classList.toggle('note-active', noted);
        noteBtn.innerHTML = `<span>${noted ? '✎' : '□'}</span><span>${noted ? '有笔记' : '笔记'}</span>`;
      }
      updateNotePreview(progress);
    }

    function formatNoteTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '刚刚';
      const pad = number => String(number).padStart(2, '0');
      return `${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function renderMarkdownNote(markdown) {
      const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
      const html = [];
      let inList = false;
      const closeList = () => {
        if (inList) {
          html.push('</ul>');
          inList = false;
        }
      };
      lines.forEach(rawLine => {
        const line = rawLine.replace(/\s+$/, '');
        if (!line.trim()) {
          closeList();
          html.push('<p></p>');
          return;
        }
        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
          closeList();
          const level = heading[1].length;
          html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
          return;
        }
        const quote = line.match(/^>\s?(.+)$/);
        if (quote) {
          closeList();
          html.push(`<blockquote>${inlineMarkdown(quote[1])}</blockquote>`);
          return;
        }
        const list = line.match(/^\s*[-*]\s+(.+)$/);
        if (list) {
          if (!inList) {
            html.push('<ul>');
            inList = true;
          }
          html.push(`<li>${inlineMarkdown(list[1])}</li>`);
          return;
        }
        closeList();
        html.push(`<p>${inlineMarkdown(line)}</p>`);
      });
      closeList();
      return html.join('');
    }

    function inlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    }

    function analysisMarkup(question) {
      const detailClass = live.detailOpen ? 'show' : '';
      const detailLabel = live.detailOpen ? '收起详细解析' : '展开详细解析';
      return `
        <div class="analysis-toolbar">
          <p><strong>简明解析：</strong>${escapeHtml(question.briefExplanation || question.explanation)}</p>
          <button class="detail-toggle" id="detailToggle" type="button">${detailLabel}</button>
        </div>
        ${activeModule === 'realExam' ? `<div class="source-line"><span>${escapeHtml(question.answerSource || '')}</span><p>${escapeHtml(question.answerSourceNote || '')}</p></div>` : ''}
        <div class="analysis-detail ${detailClass}">
          <div class="analysis-grid">
            <section class="analysis-block">
              <h3>题眼</h3>
              <p>${escapeHtml(question.keyPoint || '')}</p>
            </section>
            <section class="analysis-block">
              <h3>为什么选 ${question.answer}</h3>
              <p>${escapeHtml(question.whyCorrect || '')}</p>
            </section>
            <section class="analysis-block full">
              <h3>选项辨析</h3>
              <div class="option-analysis">${optionAnalysisMarkup(question)}</div>
            </section>
            <section class="analysis-block">
              <h3>记忆法</h3>
              <p>${escapeHtml(question.memoryCue || '')}</p>
            </section>
            <section class="analysis-block">
              <h3>易混提醒</h3>
              <p>${escapeHtml(question.pitfall || '')}</p>
            </section>
          </div>
        </div>`;
    }

    function optionAnalysisMarkup(question) {
      return letters.map(letter => {
        const cls = letter === question.answer ? 'correct' : '';
        const text = question.optionAnalysis?.[letter] || '';
        return `<div class="option-row ${cls}"><b>${letter}</b><span>${escapeHtml(text)}</span></div>`;
      }).join('');
    }

    function optionMarkup(question, letter, revealed) {
      const selected = live.selected === letter;
      const isCorrect = question.answer === letter;
      let cls = '';
      let mark = '';
      if (revealed && isCorrect) { cls = 'correct'; mark = '✓'; }
      if (revealed && selected && !isCorrect) { cls = 'wrong'; mark = '×'; }
      return `<button class="option ${cls}" data-letter="${letter}" ${state.stage === 'review' ? 'disabled' : ''}>
        <span class="letter">${letter}</span><span class="text">${escapeHtml(question.options[letter])}</span><span class="mark">${mark}</span>
      </button>`;
    }

    function chooseAnswer(question, letter) {
      if (state.stage === 'review') return;
      if (live.revealed && live.selected) return;
      const progress = progressFor(question.id);
      const correct = letter === question.answer;
      live = { ...freshLive(question.id), selected: letter, revealed: true, noteOpen: live.noteOpen, noteMode: live.noteMode };
      progress.attempts += 1;
      if (state.stage === 'self') progress.selfAttempts += 1;
      if (state.stage === 'exam') progress.examAttempts += 1;
      progress.lastAnswer = letter;
      progress.lastCorrect = correct;
      if (correct) {
        progress.correct += 1;
        progress.streak += 1;
        if (progress.streak >= 2) progress.wrongActive = false;
      } else {
        progress.wrong += 1;
        progress.streak = 0;
        progress.wrongActive = true;
      }
      saveState();
      renderAll(false);
    }

    function move(delta) {
      const pool = currentPool();
      if (!pool.length) return;
      let index = pool.findIndex(question => question.id === state.currentId);
      if (index < 0) index = 0;
      index = (index + delta + pool.length) % pool.length;
      state.currentId = pool[index].id;
      saveState();
      live = freshLive(state.currentId);
      renderAll(true);
    }

    function randomQuestion() {
      const pool = currentPool();
      if (!pool.length) return;
      let pick = pool[Math.floor(Math.random() * pool.length)];
      if (pool.length > 1) {
        while (pick.id === state.currentId) pick = pool[Math.floor(Math.random() * pool.length)];
      }
      state.currentId = pick.id;
      saveState();
      live = freshLive(state.currentId);
      renderAll(true);
    }

    function exportWrongCsv() {
      const questions = activeModule === 'realExam' ? paperScopeQuestions(false) : activeQuestions();
      const rows = questions.filter(question => progressFor(question.id).wrongActive || progressFor(question.id).wrong > 0);
      if (!rows.length) {
        alert('目前没有错题可导出。');
        return;
      }
      const header = activeModule === 'realExam'
        ? ['模块', '试卷', '答案来源', '来源说明', '题号', '题干', '正确答案', '正确选项', '最近选择', '错误次数', '连续答对', '关键词', '笔记']
        : ['模块', '章节', '题号', '题干', '正确答案', '正确选项', '最近选择', '错误次数', '连续答对', '关键词', '笔记'];
      const body = rows.map(question => {
        const progress = progressFor(question.id);
        if (activeModule === 'realExam') {
          return [activeConfig().label, question.paperTitle || question.paper, question.answerSource || '', question.answerSourceNote || '', question.number, question.stem, question.answer, question.answerText, progress.lastAnswer || '', progress.wrong, progress.streak, question.keywords.join(' / '), progress.note || ''];
        }
        return [activeConfig().label, question.chapter, question.number, question.stem, question.answer, question.answerText, progress.lastAnswer || '', progress.wrong, progress.streak, question.keywords.join(' / '), progress.note || ''];
      });
      const csv = '\ufeff' + [header, ...body].map(row => row.map(csvCell).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = activeModule === 'realExam' ? '马原真题错题.csv' : '马原单选错题.csv';
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function exportNotesMarkdown() {
      const questions = activeModule === 'realExam' ? paperScopeQuestions(false) : activeQuestions();
      const rows = questions.filter(question => hasNote(question.id));
      if (!rows.length) {
        alert('目前没有笔记可导出。');
        return;
      }
      const title = activeModule === 'realExam' ? '马原真题笔记' : '马原题库笔记';
      const lines = [
        `# ${title}`,
        '',
        `导出时间：${formatExportTime(new Date())}`,
        `模块：${activeConfig().label}`,
        ''
      ];
      rows.forEach((question, index) => {
        const progress = progressFor(question.id);
        const heading = activeModule === 'realExam'
          ? `${question.term || question.paperTitle || '真题'} 第${question.number}题`
          : `${question.chapter} 原题号${question.number}`;
        lines.push(`## ${index + 1}. ${heading}`);
        lines.push('');
        if (activeModule === 'realExam') {
          lines.push(`**试卷：** ${question.paperTitle || question.paper || ''}`);
          lines.push('');
          lines.push(`**答案来源：** ${question.answerSource || ''}`);
          if (question.answerSourceNote) {
            lines.push('');
            lines.push(`**来源说明：** ${question.answerSourceNote}`);
          }
          lines.push('');
        }
        lines.push(`**题干：** ${question.stem}`);
        lines.push('');
        lines.push('**选项：**');
        letters.forEach(letter => {
          lines.push(`- ${letter}. ${question.options[letter]}`);
        });
        lines.push('');
        lines.push(`**正确答案：** ${question.answer}. ${question.answerText || question.options[question.answer] || ''}`);
        lines.push('');
        lines.push(`**关键词：** ${Array.isArray(question.keywords) ? question.keywords.join(' / ') : ''}`);
        lines.push('');
        lines.push('**我的笔记：**');
        lines.push('');
        lines.push(progress.note.trim());
        lines.push('');
        lines.push('---');
        lines.push('');
      });
      downloadTextFile(`${title}.md`, lines.join('\n'), 'text/markdown;charset=utf-8');
    }

    function formatExportTime(date) {
      const pad = number => String(number).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function downloadTextFile(filename, content, type) {
      const blob = new Blob(['\ufeff' + content], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      const text = String(value ?? '');
      return '"' + text.replace(/"/g, '""') + '"';
    }

    function resetProgress() {
      const label = activeModule === 'realExam' ? '真题在线' : '题库练习';
      if (!confirm(`确定要清空「${label}」的答题进度、错题和收藏吗？\n\n每题笔记会保留。`)) return;
      const savedNotes = activeQuestions().reduce((notes, question) => {
        const progress = progressFor(question.id);
        if (progress.note.trim()) {
          notes[question.id] = {
            note: progress.note,
            noteUpdatedAt: progress.noteUpdatedAt
          };
        }
        return notes;
      }, {});
      state = freshState();
      Object.entries(savedNotes).forEach(([id, note]) => {
        Object.assign(progressFor(id), note);
      });
      saveState();
      live = freshLive();
      renderAll(true);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
    }

    function validateData() {
      const counts = QUESTIONS.reduce((acc, question) => {
        acc[question.chapter] = (acc[question.chapter] || 0) + 1;
        return acc;
      }, {});
      const optionOk = QUESTIONS.every(question => letters.every(letter => question.options[letter]) && letters.includes(question.answer) && question.explanation);
      const analysisOk = QUESTIONS.every(question =>
        question.briefExplanation &&
        question.keyPoint &&
        question.whyCorrect &&
        question.memoryCue &&
        question.pitfall &&
        letters.every(letter => question.optionAnalysis?.[letter])
      );
      const realPaperCounts = REAL_EXAM_QUESTIONS.reduce((acc, question) => {
        acc[question.paperId] = (acc[question.paperId] || 0) + 1;
        return acc;
      }, {});
      const official2026 = REAL_EXAM_QUESTIONS.filter(question => question.paperId === 'paper2026s1').sort((a, b) => a.number - b.number).map(question => question.answer).join('');
      const official2025s2 = REAL_EXAM_QUESTIONS.filter(question => question.paperId === 'paper2025s2').sort((a, b) => a.number - b.number).map(question => question.answer).join('');
      const examOk = REAL_EXAM_QUESTIONS.length === 120 &&
        Object.values(realPaperCounts).every(count => count === 30) &&
        official2026 === 'CABDBACDADCDBDCBAAAABDCBCBDDAA' &&
        official2025s2 === 'ABCDCABCDDABCDDDCBDADDBCDABBBD' &&
        REAL_EXAM_QUESTIONS.every(question =>
          letters.every(letter => question.options[letter]) &&
          letters.includes(question.answer) &&
          question.paperId &&
          question.paperTitle &&
          question.answerSource &&
          question.answerSourceNote &&
          question.briefExplanation &&
          question.keyPoint &&
          question.whyCorrect &&
          question.memoryCue &&
          question.pitfall &&
          letters.every(letter => question.optionAnalysis?.[letter])
      );
      console.info('题库校验', QUESTIONS.length, counts, optionOk, analysisOk);
      console.info('真题校验', REAL_EXAM_QUESTIONS.length, realPaperCounts, { official2026, official2025s2 }, examOk);
    }

    document.getElementById('exportNotes').onclick = exportNotesMarkdown;
    document.getElementById('exportWrong').onclick = exportWrongCsv;
    document.getElementById('resetProgress').onclick = resetProgress;
    validateData();
    renderAll(true);
  </script>
</body>
</html>
